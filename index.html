<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTT Entrance Exam — Study Hub</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── CSS Variables for light/dark ── */
  :root {
    --bg-page:    #f5f4f0;
    --bg-card:    #ffffff;
    --bg-btn:     #fafaf7;
    --bg-btn-active: #f0ede5;
    --bg-progress:#ece9e2;
    --bg-retake:  #f0eee8;
    --border:     #e4e1d8;
    --border-opt: #ddd9d0;
    --text-main:  #1a1a1a;
    --text-sub:   #777;
    --text-muted: #999;
    --text-hint:  #bbb;
    --text-score: #666;
    --text-eyebrow:#aaa;
    --shadow:     0 1px 4px rgba(0,0,0,0.08);
    --blue:       #2f6fed;
    --green-bg:   #eaf6ed;
    --green-bd:   #2f8f4e;
    --green-text: #1f6b37;
    --green-bd2:  #cfe9d4;
    --red-bg:     #fbecec;
    --red-bd:     #c94b4b;
    --red-text:   #9c2f2f;
    --red-bd2:    #f0d6d6;
    --amber:      #a0721f;
    --section-bd: #ece9e2;
    --toggle-bg:  #ddd9d0;
  }

  [data-theme="dark"] {
    --bg-page:    #0f1117;
    --bg-card:    #1c1f26;
    --bg-btn:     #24283200;
    --bg-btn-active: #2e3340;
    --bg-progress:#2a2d35;
    --bg-retake:  #242830;
    --border:     #2e3340;
    --border-opt: #2e3340;
    --text-main:  #e8eaf0;
    --text-sub:   #8891a4;
    --text-muted: #6b7485;
    --text-hint:  #4a5060;
    --text-score: #8891a4;
    --text-eyebrow:#555d6e;
    --shadow:     0 1px 6px rgba(0,0,0,0.4);
    --blue:       #4d8df7;
    --green-bg:   #0d2b18;
    --green-bd:   #2a7a42;
    --green-text: #4eca72;
    --green-bd2:  #1a4028;
    --red-bg:     #2b0d0d;
    --red-bd:     #9c2f2f;
    --red-text:   #f07070;
    --red-bd2:    #4a1a1a;
    --amber:      #d4963a;
    --section-bd: #2a2d35;
    --toggle-bg:  #3a3f4a;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-page); color: var(--text-main); line-height: 1.6; transition: background 0.2s, color 0.2s; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 24px 16px 60px; }

  /* Header */
  header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 24px; }
  .header-inner { text-align: center; }
  .header-inner h1 { font-size: 21px; font-weight: 700; margin-bottom: 4px; }
  .header-inner p { font-size: 14px; color: var(--text-sub); }

  /* Dark mode toggle */
  .theme-toggle {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: var(--toggle-bg);
    border: none;
    border-radius: 20px;
    width: 44px;
    height: 26px;
    cursor: pointer;
    padding: 3px;
    display: flex;
    align-items: center;
    transition: background 0.2s;
  }
  .toggle-knob {
    width: 20px;
    height: 20px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    line-height: 1;
  }
  [data-theme="dark"] .toggle-knob { transform: translateX(18px); background: #1c1f26; }
  [data-theme="dark"] .theme-toggle { background: var(--blue); }

  /* Card */
  .card { background: var(--bg-card); border-radius: 14px; padding: 20px 18px; box-shadow: var(--shadow); transition: background 0.2s; }

  /* Mode buttons */
  .mode-btn { display: block; width: 100%; text-align: left; padding: 16px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-btn); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.15s; color: var(--text-main); }
  .mode-btn:active { background: var(--bg-btn-active); }
  .mode-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .mode-sub { font-size: 13px; color: var(--text-sub); }

  /* Exam choice */
  .exam-choice { display: block; width: 100%; text-align: left; padding: 14px 16px; margin-bottom: 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-btn); cursor: pointer; -webkit-tap-highlight-color: transparent; color: var(--text-main); transition: background 0.15s; }
  .exam-choice:active { background: var(--bg-btn-active); }
  .ec-title { font-size: 15px; font-weight: 600; }
  .ec-sub { font-size: 13px; color: var(--text-sub); margin-top: 2px; }

  /* Back */
  .back-btn { background: none; border: none; color: var(--blue); font-size: 13px; cursor: pointer; padding: 0; margin-bottom: 16px; display: inline-block; }

  /* Progress */
  .progress-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .progress-bar { height: 5px; background: var(--bg-progress); border-radius: 4px; overflow: hidden; margin-bottom: 16px; }
  .progress-fill { height: 100%; background: var(--blue); transition: width 0.2s; }
  .score-line { font-size: 13px; color: var(--text-score); margin-bottom: 14px; }
  .q-text { font-size: 17px; font-weight: 600; margin-bottom: 16px; line-height: 1.5; }

  /* Options */
  .opt-btn { display: block; width: 100%; text-align: left; padding: 13px 14px; margin-bottom: 8px; border-radius: 10px; font-size: 15px; cursor: pointer; border: 1px solid var(--border-opt); background: var(--bg-card); color: var(--text-main); -webkit-tap-highlight-color: transparent; transition: background 0.1s; }
  .opt-btn:disabled { cursor: default; }
  .opt-correct { background: var(--green-bg) !important; border: 2px solid var(--green-bd) !important; color: var(--green-text) !important; }
  .opt-wrong { background: var(--red-bg) !important; border: 2px solid var(--red-bd) !important; color: var(--red-text) !important; }

  /* Feedback */
  .feedback { margin-top: 14px; padding: 14px 16px; border-radius: 10px; }
  .feedback-correct { background: var(--green-bg); }
  .feedback-wrong { background: var(--red-bg); }
  .feedback-label { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
  .label-correct { color: var(--green-text); }
  .label-wrong { color: var(--red-text); }
  .feedback-explain { font-size: 14px; color: var(--text-score); line-height: 1.6; }
  .next-btn { margin-top: 14px; width: 100%; padding: 13px; border-radius: 10px; background: var(--blue); color: #fff; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }

  /* Results */
  .results-score { text-align: center; padding: 0.5rem 0 1.2rem; }
  .big-pct { font-size: 48px; font-weight: 700; }
  .results-sub { font-size: 14px; color: var(--text-sub); margin-top: 8px; }
  .results-verdict { font-size: 15px; font-weight: 600; margin-top: 10px; }
  .pass { color: var(--green-text); }
  .fail { color: var(--red-text); }
  .section-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--section-bd); font-size: 14px; }
  .section-label { color: var(--text-sub); }
  .retake-btn { margin-top: 1.5rem; width: 100%; padding: 13px; border-radius: 10px; background: var(--bg-retake); border: 1px solid var(--border); font-size: 15px; font-weight: 600; cursor: pointer; color: var(--text-main); }

  /* Flashcard */
  .flashcard { min-height: 170px; display: flex; flex-direction: column; justify-content: center; padding: 24px 18px; border-radius: 12px; background: var(--bg-btn); border: 1px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .card-eyebrow { font-size: 11px; color: var(--text-eyebrow); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .card-term { font-size: 22px; font-weight: 700; line-height: 1.3; color: var(--text-main); }
  .card-hint { font-size: 13px; color: var(--text-hint); margin-top: 18px; }
  .card-def { font-size: 16px; color: var(--text-main); line-height: 1.65; }
  .fc-actions { display: flex; gap: 10px; margin-top: 14px; }
  .fc-learning { flex: 1; padding: 13px; border-radius: 10px; background: var(--red-bg); border: 1px solid var(--red-bd2); color: var(--red-text); font-size: 14px; font-weight: 600; cursor: pointer; }
  .fc-gotit { flex: 1; padding: 13px; border-radius: 10px; background: var(--green-bg); border: 1px solid var(--green-bd2); color: var(--green-text); font-size: 14px; font-weight: 600; cursor: pointer; }
  .fc-done { text-align: center; padding: 1.5rem 0; }
  .fc-done-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .fc-done-sub { font-size: 14px; color: var(--text-sub); margin-bottom: 20px; }
  .restart-btn { width: 100%; padding: 13px; border-radius: 10px; background: var(--blue); color: #fff; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }

  @media(max-width:480px){ .wrap{padding:16px 12px 50px;} .card{padding:16px 14px;border-radius:12px;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-inner">
      <h1>VTT Study Hub</h1>
      <p>Flashcards &middot; Practice exams &middot; Quick 10</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
      <div class="toggle-knob" id="toggle-icon">☀️</div>
    </button>
  </header>
  <div class="card" id="app"></div>
</div>

<script>
// ── Theme ─────────────────────────────────────────────────────────────────
(function() {
  const saved = localStorage.getItem('vtt-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateIcon(saved);
})();

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('vtt-theme', next);
  updateIcon(next);
}

function updateIcon(theme) {
  const icon = document.getElementById('toggle-icon');
  if (icon) icon.textContent = theme === 'dark' ? '🌙' : '☀️';
}

// ── Data ──────────────────────────────────────────────────────────────────
const EXAM1 = [{"section": "Life Stages/Nutrition", "q": "A well-designed animal housing area in a veterinary facility should include:", "options": ["Non-absorbent, easily sanitized surfaces", "Carpeted floors throughout", "No drainage system", "Shared water bowls across all cages with no cleaning"], "answer": 0, "explain": "Housing areas should use sanitary, non-porous materials that can be properly disinfected to minimize disease transmission risk."}, {"section": "Life Stages/Nutrition", "q": "Which behavior would be considered abnormal in an adult cat and may warrant behavioral or medical workup?", "options": ["Grooming after eating", "Sleeping much of the day", "Sudden, unprovoked aggression with no clear trigger", "Scratching on appropriate surfaces"], "answer": 2, "explain": "Sudden unprovoked aggression is atypical and can indicate pain, illness, or a behavioral disorder requiring veterinary evaluation."}, {"section": "Career Prep", "q": "Which of the following best supports effective time management during a busy clinic shift?", "options": ["Prioritizing tasks based on urgency and patient needs", "Doing tasks in random order", "Ignoring deadlines", "Multitasking on unrelated personal activities during patient care"], "answer": 0, "explain": "Effective time management in a clinical setting involves prioritizing based on patient urgency and workflow needs, which keeps both care quality and efficiency high."}, {"section": "Surgery/Aseptic", "q": "Absorbable suture material such as surgical gut (catgut) is broken down in tissue primarily via:", "options": ["Hydrolysis or phagocytosis depending on material type", "Evaporation", "External removal only", "UV light exposure"], "answer": 0, "explain": "Surgical gut is broken down via phagocytosis, while many synthetic absorbable materials break down through hydrolysis; both processes occur naturally within tissue."}, {"section": "Surgery/Aseptic", "q": "What is the minimum effective autoclave temperature commonly cited for achieving sterilization?", "options": ["100\u00b0C (212\u00b0F)", "121\u00b0C (250\u00b0F)", "50\u00b0C (122\u00b0F)", "200\u00b0C (392\u00b0F)"], "answer": 1, "explain": "Most autoclaves achieve sterilization at approximately 121\u00b0C (250\u00b0F) under at least 15 psi of pressure, typically for 9-15 minutes of exposure."}, {"section": "Surgery/Aseptic", "q": "Which instrument is primarily used to clamp blood vessels and control bleeding during surgery?", "options": ["Scalpel", "Hemostatic forceps (hemostats)", "Needle holder", "Retractor"], "answer": 1, "explain": "Hemostatic forceps, or hemostats, are crushing instruments specifically designed to clamp blood vessels and control hemorrhage during surgery."}, {"section": "Life Stages/Nutrition", "q": "Which vaccine is considered core for canines in most regions?", "options": ["Bordetella", "Leptospirosis", "Rabies", "Lyme disease"], "answer": 2, "explain": "Rabies, along with DA2PP (distemper, adenovirus, parvovirus, parainfluenza), is considered core for dogs because of disease severity and public health risk. Bordetella, lepto, and Lyme are typically non-core (lifestyle-dependent)."}, {"section": "Career Prep", "q": "When studying for a multiple-choice exam, which strategy is generally most effective?", "options": ["Cramming all material the night before only", "Active recall and spaced repetition over multiple study sessions", "Reading material once and never reviewing it again", "Skipping practice questions entirely"], "answer": 1, "explain": "Active recall (testing yourself) combined with spaced repetition (reviewing material over multiple sessions) is well-supported as more effective than passive rereading or last-minute cramming."}, {"section": "Surgery/Aseptic", "q": "Needle holders are primarily used to:", "options": ["Cut tissue", "Grasp and manipulate curved suture needles", "Retract the surgical site", "Suction fluid"], "answer": 1, "explain": "Needle holders (e.g., Mayo-Hegar, Olsen-Hegar) are designed specifically to grasp and control curved suture needles during wound closure."}, {"section": "Lab Techniques", "q": "Which of the following is considered a zoonotic disease?", "options": ["Parvovirus", "Rabies", "Heartworm disease", "Feline leukemia"], "answer": 1, "explain": "Rabies is transmissible from animals to humans, making it a classic zoonosis. Parvo, heartworm, and FeLV are not transmissible to people."}, {"section": "Life Stages/Nutrition", "q": "Which vaccine is considered core for felines?", "options": ["Feline leukemia virus (FeLV)", "Feline panleukopenia (part of FVRCP)", "Chlamydophila", "Feline immunodeficiency virus (FIV)"], "answer": 1, "explain": "FVRCP (feline viral rhinotracheitis, calicivirus, panleukopenia) along with rabies are core feline vaccines. FeLV, Chlamydophila, and FIV are non-core/lifestyle-based."}, {"section": "Lab Techniques", "q": "Which organism is the causative agent of ringworm in dogs and cats?", "options": ["A bacterium", "A fungus", "A virus", "A protozoan"], "answer": 1, "explain": "Ringworm (dermatophytosis) is caused by fungi, most commonly Microsporum canis. Despite the name, it is not caused by a worm."}, {"section": "Pharmacology", "q": "What is the value of 3.8 meters in millimeters?", "options": ["38 mm", "380 mm", "3,800 mm", "38,000 mm"], "answer": 2, "explain": "1 m = 1,000 mm, so 3.8 m \u00d7 1,000 = 3,800 mm."}, {"section": "Surgery/Aseptic", "q": "Which procedures are typically done in the preparation area rather than the surgery room?", "options": ["Final draping of the sterile field", "Clipping the patient and other 'dirty' procedures like wound debridement", "Closing the surgical incision", "Administering inhalant anesthesia maintenance"], "answer": 1, "explain": "Clipping fur and other dirty procedures (like debriding old wounds or treating abscesses) are performed in the prep area to keep the sterile surgery room free of contamination."}, {"section": "Life Stages/Nutrition", "q": "Which of these is an example of normal behavioral development in a puppy?", "options": ["Extreme fear of all new stimuli at 8 weeks with no improvement over time", "Progressive socialization and curiosity during the socialization period (roughly 3-14 weeks)", "Complete avoidance of littermates", "Aggression toward all humans from birth"], "answer": 1, "explain": "The canine socialization period is a critical window where puppies normally show increasing curiosity and adaptability to new people, animals, and environments."}, {"section": "Nursing/Radiography", "q": "A common intramuscular injection site in dogs and cats is the:", "options": ["Lumbar epaxial muscles or the caudal thigh muscles", "The cornea", "The footpad", "The nose"], "answer": 0, "explain": "Common IM sites include the epaxial (lumbar) muscles and caudal thigh muscles (with caution near the sciatic nerve), chosen for adequate muscle mass."}, {"section": "Life Stages/Nutrition", "q": "Macronutrients required in an animal's diet include all of the following EXCEPT:", "options": ["Protein", "Fat", "Carbohydrates", "Vitamins"], "answer": 3, "explain": "Protein, fat, and carbohydrates are macronutrients needed in larger quantities. Vitamins are micronutrients needed in much smaller amounts."}, {"section": "Nursing/Radiography", "q": "Normal rectal temperature in dogs is generally cited as approximately:", "options": ["95-97\u00b0F", "99.5-102\u00b0F", "104-106\u00b0F", "90-95\u00b0F"], "answer": 1, "explain": "Normal canine rectal temperature is typically 99.5-102\u00b0F (37.5-39\u00b0C). Cats run very similarly, around 100-102\u00b0F."}, {"section": "Surgery/Aseptic", "q": "Disinfection differs from sterilization in that disinfection:", "options": ["Destroys all microorganisms including spores", "Destroys most pathogenic microorganisms on inanimate objects, but not necessarily spores", "Is only used on living tissue", "Is identical to antisepsis"], "answer": 1, "explain": "Disinfection targets most pathogenic microorganisms on nonliving surfaces but does not guarantee destruction of bacterial spores, unlike sterilization."}, {"section": "Surgery/Aseptic", "q": "Items that cannot tolerate the heat and pressure of steam sterilization (e.g., some plastics, endoscopes) are commonly sterilized using:", "options": ["Ethylene oxide gas sterilization", "Boiling water only", "Open air exposure", "Freezing"], "answer": 0, "explain": "Ethylene oxide gas sterilization is used for heat-sensitive items that cannot withstand autoclaving, though it requires proper aeration afterward due to its toxicity."}, {"section": "Nursing/Radiography", "q": "Intravenous fluid therapy is generally chosen over subcutaneous fluids when:", "options": ["The patient needs rapid correction of significant dehydration or shock", "The patient is mildly dehydrated and stable", "Cost needs to be minimized", "The patient is fully hydrated"], "answer": 0, "explain": "IV fluids allow rapid, controlled, and more substantial volume delivery, making them appropriate for moderate to severe dehydration, shock, or critical patients."}, {"section": "Lab Techniques", "q": "A zoonosis is best defined as:", "options": ["A disease that only affects one species", "A disease transmissible from animals to humans", "An infection acquired in a hospital setting", "A disease caused by parasites only"], "answer": 1, "explain": "Zoonosis specifically refers to disease that can pass from animals to humans, regardless of the causative agent (bacteria, virus, parasite, or fungus)."}, {"section": "Nursing/Radiography", "q": "For radiographic positioning, the term 'ventrodorsal' (VD) refers to:", "options": ["The patient lying on its side with the beam passing side to side", "The patient lying on its back with the beam entering ventrally and exiting dorsally", "A standing lateral view", "A view of only the limb"], "answer": 1, "explain": "Ventrodorsal positioning has the patient in dorsal recumbency (on its back), with the x-ray beam passing from the ventral surface through to the dorsal surface."}, {"section": "Nursing/Radiography", "q": "A basket muzzle is generally preferred over a fabric muzzle for dogs because it:", "options": ["Prevents panting and drinking entirely", "Allows the dog to pant, drink, and breathe more easily while still preventing biting", "Is cheaper", "Cannot be used on aggressive dogs"], "answer": 1, "explain": "Basket muzzles allow normal panting and even some drinking, making them safer for longer-term use, while still preventing the dog from biting."}, {"section": "Office Procedures", "q": "The scope of practice for a credentialed veterinary technician generally includes which of the following, under supervision?", "options": ["Diagnosing disease independently", "Prescribing medications without oversight", "Performing technical and nursing tasks delegated by the veterinarian", "Performing surgery without a veterinarian present"], "answer": 2, "explain": "Credentialed veterinary technicians perform many nursing and technical duties under the supervision and direction of a licensed veterinarian, but diagnosis, prognosis, and surgery remain restricted to the DVM in most states."}, {"section": "Nursing/Radiography", "q": "The effectiveness of fluid therapy can be monitored by assessing:", "options": ["Hydration status, urine output, and vital signs", "The color of the fluid bag only", "The patient's coat color", "The time of day"], "answer": 0, "explain": "Effectiveness is judged through clinical parameters like hydration status (skin turgor, mucous membranes), urine output, and normalized vital signs."}, {"section": "Lab Techniques", "q": "When labeling a laboratory sample, which piece of information is essential to include?", "options": ["Only the date", "Only the veterinarian's name", "Patient name, owner name, date, and source of sample", "Only the test requested"], "answer": 2, "explain": "Proper labeling requires enough identifying information to prevent mix-ups: patient and owner name, date collected, and the sample source/type at minimum."}, {"section": "Life Stages/Nutrition", "q": "Appropriate husbandry to reduce disease and stress in a boarded kennel includes:", "options": ["Crowding multiple unfamiliar animals into one space", "Routine cleaning, proper ventilation, and adequate space per animal", "Eliminating all enrichment", "Avoiding any temperature control"], "answer": 1, "explain": "Good husbandry practices reduce disease transmission and stress through sanitation, adequate space, ventilation, and appropriate environmental enrichment."}, {"section": "Office Procedures", "q": "What is the appropriate first step when admitting a new patient?", "options": ["Begin treatment immediately", "Obtain a brief history and reason for visit from the owner", "Send the patient straight to surgery", "Skip documentation if the visit is routine"], "answer": 1, "explain": "Admitting a patient starts with gathering a relevant history (signalment, reason for visit, current concerns) before any other administrative or clinical step."}, {"section": "Career Prep", "q": "On a multiple-choice exam, which test-taking strategy is generally recommended?", "options": ["Always choose the first answer that seems plausible without reading all options", "Read every answer choice before selecting, and eliminate clearly wrong options first", "Skip questions you're unsure about and never return to them", "Change every answer at the last minute regardless of confidence"], "answer": 1, "explain": "Reading all options and using elimination improves accuracy, especially on exams with close or tricky distractor answers."}, {"section": "Pharmacology", "q": "A medication contains 50mg/tab. Dose is 10mg/kg TID for a 45-pound dog, for 5 days. How many tablets should be dispensed? (Round to the nearest whole number.)", "options": ["About 31 tablets", "About 41 tablets", "About 51 tablets", "About 61 tablets"], "answer": 3, "explain": "Convert weight: 45 lb \u00f7 2.2 = 20.45 kg. Dose per administration: 10mg/kg \u00d7 20.45kg = 204.5mg. Tablets per dose: 204.5mg \u00f7 50mg/tab = 4.09 tabs. Total doses over treatment: TID (3x/day) \u00d7 5 days = 15 doses. Total tablets: 4.09 \u00d7 15 = 61.4, which rounds to 61 tablets."}, {"section": "Pharmacology", "q": "Which best differentiates general anesthesia from local anesthesia?", "options": ["General anesthesia only affects a small area; local affects the whole body", "General anesthesia causes full unconsciousness; local anesthesia numbs a specific area while the patient remains conscious", "They are identical in effect", "Local anesthesia always requires intubation"], "answer": 1, "explain": "General anesthesia produces total unconsciousness and loss of sensation throughout the body, while local anesthesia blocks sensation in a specific area without affecting consciousness."}, {"section": "Nursing/Radiography", "q": "According to standard reference ranges, the normal resting heart rate range for an adult cat is approximately:", "options": ["40-60 beats/min", "140-250 beats/min", "300-400 beats/min", "10-30 beats/min"], "answer": 1, "explain": "Normal feline heart rate is typically cited as 140-250 beats per minute, notably faster than canine resting heart rate."}, {"section": "Pharmacology", "q": "What is the value of 5 liters in milliliters?", "options": ["50 mL", "500 mL", "5,000 mL", "50,000 mL"], "answer": 2, "explain": "Multiply liters by 1000 to get mL: 5 L \u00d7 1000 = 5,000 mL."}, {"section": "Anatomy", "q": "The appendicular skeleton refers to the bones of the:", "options": ["Skull", "Limbs (forelimbs and hindlimbs)", "Spine", "Ribs"], "answer": 1, "explain": "The appendicular skeleton is composed of the bones of the limbs \u2014 the thoracic (front) limb and pelvic (hind) limb."}, {"section": "Career Prep", "q": "If a veterinary assistant is unsure how to perform a task that has been delegated to them, the best course of action is to:", "options": ["Guess and proceed anyway", "Ask the supervising veterinarian or technician for clarification before proceeding", "Skip the task entirely without telling anyone", "Perform a different task instead without communication"], "answer": 1, "explain": "When uncertain, asking for clarification from a supervisor protects patient safety and is a core expectation of professional conduct in veterinary settings."}, {"section": "Pharmacology", "q": "Which best defines an adverse drug reaction (ADR)?", "options": ["Any expected, beneficial effect of a drug", "An unintended and harmful response to a medication given at a normal dose", "A reaction that only occurs with overdose", "A reaction that never requires reporting"], "answer": 1, "explain": "An ADR is an unintended, harmful response occurring at normal therapeutic doses, distinct from toxicity from overdose or expected side effects."}, {"section": "Anatomy", "q": "The heart is composed of how many chambers?", "options": ["Two", "Three", "Four", "Six"], "answer": 2, "explain": "The heart has four chambers: the right atrium, right ventricle, left atrium, and left ventricle, organized into two side-by-side pumps."}, {"section": "Pharmacology", "q": "Convert 480 cc into liters.", "options": ["0.048 L", "0.48 L", "4.8 L", "48 L"], "answer": 1, "explain": "1 cc = 1 mL, and 1000 mL = 1 L, so 480 cc = 480 mL = 0.48 L."}, {"section": "Life Stages/Nutrition", "q": "Compared to dogs, the feline estrous cycle is best described as:", "options": ["Identical to canine cycles", "Seasonally polyestrous, with cats often being induced ovulators", "Strictly monestrous (once per year)", "Nonexistent; cats do not cycle"], "answer": 1, "explain": "Cats are typically seasonally polyestrous and are induced ovulators, meaning ovulation is generally triggered by the act of mating rather than occurring spontaneously."}, {"section": "Life Stages/Nutrition", "q": "According to AVMA Responsible Pet Ownership guidelines, which of the following is a core recommendation?", "options": ["Provide regular veterinary care including vaccinations", "Allow pets to roam freely without supervision", "Feed only table scraps", "Skip routine wellness exams once adult"], "answer": 0, "explain": "Responsible ownership guidelines emphasize routine veterinary care, proper identification, nutrition, and humane treatment."}, {"section": "Anatomy", "q": "The axial skeleton is composed of the bones of the:", "options": ["Limbs only", "Skull, spinal column, ribs, and sternum", "Pelvis only", "Tail only"], "answer": 1, "explain": "The axial skeleton runs along the body's midline and includes the skull, vertebral column, ribs, and sternum, distinct from the appendicular skeleton (limbs)."}, {"section": "Life Stages/Nutrition", "q": "Which of the following canine breeds is classified as a working breed?", "options": ["Siberian Husky", "Beagle", "Chihuahua", "Poodle (toy)"], "answer": 0, "explain": "The Siberian Husky is part of the AKC Working Group, historically bred for sledding and labor tasks, distinct from hound, toy, or non-sporting groups."}, {"section": "Pharmacology", "q": "10 kilograms equals how many grams?", "options": ["100 g", "1,000 g", "10,000 g", "100,000 g"], "answer": 2, "explain": "1 kg = 1,000 g, so 10 kg \u00d7 1,000 = 10,000 g."}, {"section": "Life Stages/Nutrition", "q": "How can a veterinary assistant help prepare a client for pet loss?", "options": ["Avoid discussing the topic entirely", "Provide compassionate communication and information about grief resources", "Rush the client through the process", "Discourage the client from asking questions"], "answer": 1, "explain": "Veterinary assistants can support grieving clients through empathetic communication and by providing resources, such as pet loss support information."}, {"section": "Office Procedures", "q": "Which of these best describes a legal responsibility of veterinary staff regarding client records?", "options": ["Records can be shared with anyone who asks", "Records must be retained for a legally defined period of time", "Records may be destroyed immediately after a visit", "Only the veterinarian needs to know what's in the record"], "answer": 1, "explain": "State laws require veterinary medical records be retained for a set number of years; staff are legally responsible for proper retention and handling."}, {"section": "Pharmacology", "q": "A medication contains 100mg/mL. The dose rate is 10mg/kg BID for a patient weighing 100kg. What is the TOTAL DAILY dose in mg?", "options": ["1,000 mg", "2,000 mg", "100 mg", "10,000 mg"], "answer": 1, "explain": "Per-dose amount: 10mg/kg \u00d7 100kg = 1,000mg per dose. BID means twice daily, so total daily dose = 1,000mg \u00d7 2 = 2,000mg."}, {"section": "Lab Techniques", "q": "Which of these is NOT typically considered a zoonotic disease?", "options": ["Toxoplasmosis", "Leptospirosis", "Ringworm", "Canine distemper"], "answer": 3, "explain": "Canine distemper affects dogs and related species but does not infect humans. Toxoplasmosis, leptospirosis, and ringworm can all be transmitted to people."}, {"section": "Pharmacology", "q": "On a prescription label, which element identifies how the medication should be given?", "options": ["The directions for use (e.g., 'Give one tablet twice daily')", "The pharmacy's phone number only", "The expiration date only", "The veterinarian's signature"], "answer": 0, "explain": "Directions for use tell the client how, how much, and how often to administer the medication\u2014an essential and required label component."}, {"section": "Anatomy", "q": "Which of the following are the four basic types of tissue in the body?", "options": ["Epithelial, connective, muscle, and nervous", "Bone, blood, fat, and skin", "Cardiac, smooth, skeletal, and epithelial", "Dermal, epidermal, hypodermal, and vascular"], "answer": 0, "explain": "The four basic tissue types are epithelial, connective, muscle, and nervous tissue, each with distinct structures and functions."}, {"section": "Nursing/Radiography", "q": "Which of the following is part of a comprehensive physical examination?", "options": ["Auscultation of heart and lungs", "Checking the patient's email", "Filing the patient's record only", "Skipping palpation of the abdomen"], "answer": 0, "explain": "Auscultation of heart and lungs is a core part of a physical exam, along with palpation, observation of mucous membranes, body condition scoring, and other system checks."}, {"section": "Pharmacology", "q": "A medication is available as 3g/10mL. The doctor orders 9g. How many mL will be prepared?", "options": ["10 mL", "20 mL", "30 mL", "3 mL"], "answer": 2, "explain": "Set up a proportion: 3g/10mL = 9g/x mL. Cross-multiply: 3x = 90, so x = 30 mL."}, {"section": "Pharmacology", "q": "How many liters are in 525 mL?", "options": ["0.525 L", "5.25 L", "52.5 L", "0.0525 L"], "answer": 0, "explain": "Divide mL by 1000 to convert to liters: 525 \u00f7 1000 = 0.525 L."}, {"section": "Life Stages/Nutrition", "q": "Non-core vaccines are generally administered based on:", "options": ["The animal's age only", "The animal's lifestyle and regional disease risk", "Random scheduling", "Owner's vaccine preference with no clinical input"], "answer": 1, "explain": "Non-core vaccines (e.g., Bordetella, Lyme, FeLV) are recommended based on an individual animal's exposure risk, geography, and lifestyle factors."}, {"section": "Career Prep", "q": "Which of the following is considered an essential 'soft skill' for veterinary assistants when communicating with grieving or upset clients?", "options": ["Empathy and active listening", "Speaking as fast as possible", "Avoiding eye contact", "Interrupting to move to the next client"], "answer": 0, "explain": "Empathy and active listening help build trust with clients, especially during stressful or emotional situations like discussing a pet's illness or loss."}, {"section": "Nursing/Radiography", "q": "What is a key responsibility of the person performing restraint during an injection?", "options": ["Distracting the veterinarian", "Maintaining control of the patient's body and the limb/area being used, without restricting breathing", "Holding only the tail", "Leaving the room once restraint begins"], "answer": 1, "explain": "The restrainer must maintain safe, effective control of the relevant body part for the procedure while avoiding excessive restriction that could harm the patient (e.g., compromising breathing)."}, {"section": "Nursing/Radiography", "q": "Which task is typically within the scope of a veterinary assistant rather than a credentialed veterinary technician?", "options": ["Administering anesthesia", "Interpreting bloodwork", "Feeding and basic restraint of patients", "Performing surgery"], "answer": 2, "explain": "Veterinary assistants commonly handle feeding, basic restraint, exercising, and similar supportive nursing tasks. Anesthesia administration, diagnostic interpretation, and surgery require a credentialed technician or veterinarian."}, {"section": "Pharmacology", "q": "A possible consequence of an adverse drug reaction includes:", "options": ["Improved patient outcome with no risk", "Organ damage, allergic reaction, or in severe cases death", "Guaranteed cure of the underlying disease", "No clinical significance ever"], "answer": 1, "explain": "ADRs can range from mild (rash, GI upset) to severe (organ damage, anaphylaxis, death), which is why monitoring and reporting are important."}, {"section": "Surgery/Aseptic", "q": "Sterility refers to:", "options": ["The complete absence of all living microorganisms on an item", "Reducing only some bacteria", "A surface that looks clean", "Reducing odor"], "answer": 0, "explain": "Sterility means the total destruction or absence of all microorganisms, including spores, on a surface or object \u2014 a higher standard than disinfection."}, {"section": "Surgery/Aseptic", "q": "Chemical sterilization indicators (such as indicator tape) primarily verify:", "options": ["That sterility has been guaranteed", "That a certain temperature or chemical exposure threshold was reached during the cycle", "The exact bacterial count remaining", "Nothing useful"], "answer": 1, "explain": "Indicators change color when specific temperature/chemical/time conditions are met, but they do not guarantee true sterility \u2014 biologic testing is used for that verification."}, {"section": "Nursing/Radiography", "q": "The normal respiratory rate range for both dogs and cats at rest is approximately:", "options": ["10-30 breaths/min", "50-70 breaths/min", "1-5 breaths/min", "100-150 breaths/min"], "answer": 0, "explain": "Normal resting respiratory rate for both dogs and cats generally falls in the range of about 10-30 breaths per minute."}, {"section": "Pharmacology", "q": "A valid Veterinarian-Client-Patient Relationship (VCPR) is required before a veterinarian can:", "options": ["Prescribe or dispense medication for a patient", "Greet a new client", "Schedule an appointment", "Answer general questions about pet care"], "answer": 0, "explain": "A valid VCPR (the vet has recently examined or has sufficient knowledge of the patient, and is available for follow-up) is legally required before prescribing or dispensing medication."}, {"section": "Life Stages/Nutrition", "q": "Which feline breed is known for being naturally tailless or having a very short tail?", "options": ["Manx", "Siamese", "Persian", "Ragdoll"], "answer": 0, "explain": "The Manx breed is best known for a genetic mutation that results in a short or absent tail."}, {"section": "Nursing/Radiography", "q": "What is the primary purpose of restraining an animal during a veterinary procedure?", "options": ["To punish the animal", "To ensure safety of the patient, staff, and accuracy of the procedure", "To make the procedure take longer", "To replace anesthesia in all cases"], "answer": 1, "explain": "Restraint protects the patient and handlers from injury and helps ensure the procedure (injection, blood draw, exam) can be performed accurately and efficiently."}, {"section": "Surgery/Aseptic", "q": "Sterilization is defined as:", "options": ["The destruction of most, but not all, pathogenic organisms", "The destruction of all microorganisms including spores", "Cleaning visible debris only", "Reducing odor on instruments"], "answer": 1, "explain": "Sterilization destroys all microorganisms, including bacterial spores, which is a more complete process than disinfection."}, {"section": "Office Procedures", "q": "Which document typically requires a veterinarian's (not assistant's) signature?", "options": ["Appointment reminder card", "Health certificate for travel", "Reception sign-in sheet", "Inventory restock order"], "answer": 1, "explain": "Health certificates, controlled substance logs, and similar legal documents require a licensed veterinarian's signature, not an assistant's."}, {"section": "Career Prep", "q": "Which file-handling practice best protects patient data confidentiality in a digital record system?", "options": ["Sharing login credentials with all staff freely", "Logging out or locking your workstation when stepping away from patient records", "Leaving patient records open on an unattended screen", "Printing all records and leaving them on the front desk"], "answer": 1, "explain": "Locking or logging out of a workstation when away protects sensitive patient and client information from unauthorized viewing, supporting confidentiality requirements."}, {"section": "Nursing/Radiography", "q": "When placing a cat into a cage, which practice is safest?", "options": ["Place the cat in head-first while supporting the hindquarters", "Toss the cat in quickly to avoid scratches", "Hold only the tail while placing the cat in the cage", "Open the cage door fully and let the cat enter on its own without supervision"], "answer": 0, "explain": "Cats should be supported and placed gently head-first into the cage, maintaining control of the body to prevent injury to the animal or handler."}, {"section": "Office Procedures", "q": "Maintaining accurate medical records primarily serves which purpose?", "options": ["Continuity of patient care and legal documentation", "Decoration for the front desk", "A way to avoid talking to clients", "Only useful for marketing purposes"], "answer": 0, "explain": "Medical records ensure continuity of care between visits and providers, and serve as the legal record of services rendered and findings."}, {"section": "Lab Techniques", "q": "For cephalic venipuncture in a small animal patient, the restrainer's main role is to:", "options": ["Apply a tourniquet above the elbow only", "Extend the leg and occlude the vein by applying pressure above the venipuncture site", "Hold the patient's mouth closed", "Apply pressure below the venipuncture site"], "answer": 1, "explain": "The restrainer extends the front leg and applies digital pressure proximal to (above) the draw site to distend the cephalic vein for visualization and access."}, {"section": "Anatomy", "q": "Which type of joint allows free movement in multiple directions, such as the elbow or hip?", "options": ["Fibrous joint", "Cartilaginous joint", "Synovial (diarthrodial) joint", "Sutures of the skull"], "answer": 2, "explain": "Synovial (diarthrodial) joints are freely movable and lubricated by synovial fluid, allowing motions such as flexion, extension, and rotation."}, {"section": "Career Prep", "q": "Which of these is a basic computer skill commonly expected in a veterinary office setting?", "options": ["Entering and retrieving patient records in practice management software", "Writing custom software code", "Repairing the office printer's internal hardware", "Building a website"], "answer": 0, "explain": "Veterinary assistants are expected to handle day-to-day software use like data entry and retrieval in practice management systems, not advanced technical work."}, {"section": "Career Prep", "q": "Which of the following best demonstrates professionalism in a veterinary workplace?", "options": ["Arriving on time, following the dress code, and communicating respectfully with coworkers", "Frequently missing shifts without notice", "Disregarding the chain of command", "Speaking negatively about coworkers to clients"], "answer": 0, "explain": "Professionalism includes reliability, appropriate appearance and conduct, and respectful communication with both coworkers and clients."}, {"section": "Surgery/Aseptic", "q": "What is the most common and efficient method of sterilization used in veterinary clinics?", "options": ["UV light exposure", "Pressurized steam (autoclaving)", "Soaking in plain water", "Air drying"], "answer": 1, "explain": "Autoclaving uses pressurized steam to achieve sterilization and is the most common, cost-effective method used for most veterinary surgical instruments."}, {"section": "Life Stages/Nutrition", "q": "Minerals such as calcium and phosphorus are primarily important for:", "options": ["Energy production only", "Bone and skeletal health, among other functions", "Coat color", "Digestion of fiber exclusively"], "answer": 1, "explain": "Calcium and phosphorus are key minerals for skeletal structure, with additional roles in nerve and muscle function."}, {"section": "Office Procedures", "q": "Which scenario represents a violation of client/patient confidentiality?", "options": ["Discussing a case with the supervising veterinarian", "Releasing medical records to another vet with the owner's consent", "Posting a client's pet photo and diagnosis on social media without permission", "Documenting findings in the patient's chart"], "answer": 2, "explain": "Sharing identifiable patient or client information publicly without consent is a confidentiality violation and can carry legal consequences."}, {"section": "Surgery/Aseptic", "q": "According to AAHA recommendations, a surgical facility should ideally have three distinct areas. Which of the following is one of them?", "options": ["Waiting room", "Preparation area", "Front desk", "Pharmacy storage closet"], "answer": 1, "explain": "AAHA recommends three distinct areas: the preparation area, the scrub area, and the surgery room itself, each serving a different role in maintaining asepsis."}, {"section": "Anatomy", "q": "The two main layers of skin are the:", "options": ["Epidermis and dermis", "Hypodermis and fascia", "Cortex and medulla", "Serosa and mucosa"], "answer": 0, "explain": "Skin consists of the superficial epidermis (epithelial layer) and the deeper dermis (connective tissue layer), with the hypodermis lying beneath both."}, {"section": "Pharmacology", "q": "Which task may a veterinary assistant typically NOT perform regarding dispensing medication?", "options": ["Labeling a container with information provided by the veterinarian", "Choosing the appropriate medication and dose for the patient", "Handing a properly labeled prescription to the client per veterinarian instruction", "Providing directions for use as written by the veterinarian"], "answer": 1, "explain": "Selecting the medication and calculating dosing are clinical decisions reserved for the veterinarian (or technician under specific delegation), not the assistant."}, {"section": "Surgery/Aseptic", "q": "Aseptic technique is best defined as:", "options": ["A method to speed up surgery time", "All precautions taken to prevent contamination and infection of a surgical wound", "A way to clean the waiting room", "A type of suture material"], "answer": 1, "explain": "Aseptic technique encompasses all the precautions used before and during surgery to minimize contamination and reduce the risk of postoperative infection."}, {"section": "Surgery/Aseptic", "q": "Postoperative monitoring of a surgical patient should include checking:", "options": ["Body temperature, attitude, appetite, and the surgical incision", "Only the cage card", "The owner's contact information repeatedly", "Nothing until discharge"], "answer": 0, "explain": "Postoperative evaluation includes body temperature, weight, attitude, appetite/thirst, urination/defecation, and appearance of the surgical wound to catch complications early."}, {"section": "Life Stages/Nutrition", "q": "A key consideration in the euthanasia decision-making process is:", "options": ["Cost alone, regardless of the patient's condition", "Quality of life and prognosis for the patient", "Convenience for the clinic schedule", "Avoiding the topic with the owner"], "answer": 1, "explain": "Euthanasia decisions should center on the animal's quality of life, prognosis, and suffering, discussed openly and compassionately with the owner."}, {"section": "Lab Techniques", "q": "Which urinalysis component is assessed using a chemical reagent strip (dipstick)?", "options": ["Specific gravity only", "Color and clarity only", "pH, protein, glucose, ketones, and blood", "Sediment cell counts"], "answer": 2, "explain": "Reagent strips provide rapid chemical analysis for items like pH, protein, glucose, ketones, bilirubin, and occult blood. Specific gravity requires a refractometer, and sediment exam requires microscopy."}, {"section": "Pharmacology", "q": "Which of the following should NOT happen even when a valid VCPR exists?", "options": ["Refilling a prescription after appropriate reassessment", "Prescribing a medication for a condition the veterinarian has never evaluated in that patient and has no records for", "Discussing side effects with the client", "Documenting the prescription in the medical record"], "answer": 1, "explain": "Even with a valid VCPR for general care, prescribing medication for an unrelated or unevaluated condition without proper assessment is inappropriate and can violate prescribing standards."}, {"section": "Pharmacology", "q": "Which best differentiates a prescription drug from an over-the-counter (OTC) drug?", "options": ["Prescription drugs can be bought off the shelf; OTC cannot", "Prescription drugs legally require veterinary authorization; OTC do not", "OTC drugs are regulated by the FDA, prescription drugs are not", "There is no real difference"], "answer": 1, "explain": "Prescription drugs require a veterinarian's order due to safety/dosing concerns, while OTC products can be purchased without one. Both categories are FDA-regulated, just differently."}, {"section": "Lab Techniques", "q": "Why is accurate documentation of lab results in the medical record important?", "options": ["It is only needed for billing purposes", "It supports continuity of care and legal protection for the practice", "It is optional unless results are abnormal", "It only matters for surgical patients"], "answer": 1, "explain": "Accurate, timely documentation supports patient care decisions over time and serves as a legal record of what was done and found."}, {"section": "Lab Techniques", "q": "When restraining a dog for jugular venipuncture, the patient is typically positioned:", "options": ["In lateral recumbency with the neck extended", "Sitting upright with the head pulled down", "In dorsal recumbency with the head extended and chin up", "Standing with the head turned to the side"], "answer": 2, "explain": "Jugular draws are usually performed with the patient in dorsal or sitting position, head and neck extended upward, so the vein is visualized along the jugular furrow."}, {"section": "Life Stages/Nutrition", "q": "Which nutrient is considered the most critical for survival, with even short-term deprivation being dangerous?", "options": ["Water", "Fiber", "Vitamin C", "Calcium"], "answer": 0, "explain": "Water is essential for nearly every physiological process; animals can survive far longer without food than without water."}, {"section": "Pharmacology", "q": "Using the same medication (100mg/mL) and the 1,000mg per-dose amount from the previous calculation, how many mL is given per dose?", "options": ["1 mL", "5 mL", "10 mL", "100 mL"], "answer": 2, "explain": "1,000mg \u00f7 100mg/mL = 10 mL per dose."}, {"section": "Lab Techniques", "q": "Specific gravity of urine is measured using which instrument?", "options": ["A hemocytometer", "A refractometer", "A centrifuge", "A microscope"], "answer": 1, "explain": "A refractometer measures urine specific gravity by assessing how light bends through the sample, indicating concentration of dissolved solutes."}, {"section": "Surgery/Aseptic", "q": "Which of the following is a basic rule of aseptic technique in the operating room?", "options": ["Mix sterile and nonsterile items freely", "Keep sterile items grouped together and separate from nonsterile items", "Increase unnecessary movement around the surgical field", "Assume an item is sterile unless proven otherwise"], "answer": 1, "explain": "A core rule is to keep sterile items together, separate from nonsterile items, restrict unnecessary movement, and when in doubt, consider an item contaminated."}, {"section": "Nursing/Radiography", "q": "Subcutaneous fluid administration is primarily used to:", "options": ["Provide rapid, large-volume resuscitation in shock", "Provide mild rehydration support for patients who can tolerate slower absorption", "Replace the need for IV fluids in all critical patients", "Deliver anesthesia"], "answer": 1, "explain": "Subcutaneous fluids are absorbed slowly and are appropriate for mild dehydration or supportive care, not for emergencies requiring rapid volume replacement."}, {"section": "Office Procedures", "q": "Which of the following is an ethical responsibility in veterinary practice?", "options": ["Maintaining client confidentiality", "Charging the highest possible price", "Avoiding all communication with clients", "Refusing care to ensure profit"], "answer": 0, "explain": "Maintaining confidentiality of client and patient information is a core ethical responsibility for anyone working in a veterinary practice."}, {"section": "Pharmacology", "q": "Which statement about parasiticides is generally true?", "options": ["All parasiticides are safe for all species at any dose", "Some parasiticides (e.g., certain permethrin products) are dangerous or even fatal in cats", "Parasiticides have no contraindications", "Parasiticides cannot cause toxicity"], "answer": 1, "explain": "Permethrin-based products, safe in dogs, can be highly toxic and even fatal in cats, illustrating why species-specific dosing and product selection matters."}, {"section": "Lab Techniques", "q": "Fecal flotation is primarily used to diagnose:", "options": ["Bacterial skin infections", "Internal parasites", "Urinary tract infections", "Anemia"], "answer": 1, "explain": "Fecal flotation uses a solution with a specific gravity that causes parasite eggs/oocysts to float to the surface, allowing identification of intestinal parasites."}, {"section": "Lab Techniques", "q": "The saphenous vein used for venipuncture in dogs is located:", "options": ["On the lateral aspect of the rear leg, above the hock", "On the cranial aspect of the front leg", "Inside the ear pinna", "On the ventral abdomen"], "answer": 0, "explain": "The lateral saphenous vein runs across the lateral surface of the lower hind limb and is a common venipuncture site, especially in dogs."}, {"section": "Surgery/Aseptic", "q": "Which of the following best describes monofilament suture material?", "options": ["Made of several braided strands", "Made of a single strand, creating less tissue drag", "Always nonabsorbable", "Cannot be used in surgery"], "answer": 1, "explain": "Monofilament sutures consist of a single strand of material, resulting in less tissue drag than braided multifilament sutures, though they can be less pliable."}, {"section": "Nursing/Radiography", "q": "The subcutaneous injection site in dogs and cats is typically:", "options": ["Directly into a vein", "The loose skin over the dorsal neck/scapular region", "Inside the ear canal", "Between the toes"], "answer": 1, "explain": "The loose skin over the back of the neck and shoulders (scruff area) is the standard site for subcutaneous injections due to easy tenting of the skin."}, {"section": "Office Procedures", "q": "A client calls upset about their bill and uses harsh language with the front desk staff. What is the most appropriate response?", "options": ["Hang up immediately", "Argue back to defend the practice", "Remain calm, listen, and address their concern professionally", "Ignore the call"], "answer": 2, "explain": "Professional client communication standards call for staying calm and addressing concerns respectfully, even when clients are upset, to de-escalate and maintain trust."}, {"section": "Nursing/Radiography", "q": "According to standard reference ranges, the normal resting heart rate range for an adult dog is approximately:", "options": ["20-40 beats/min", "60-140 beats/min", "200-300 beats/min", "10-20 beats/min"], "answer": 1, "explain": "Normal canine heart rate is generally cited as 60-140 beats per minute, varying with size (smaller dogs trend higher)."}];
const EXAM2 = [{"section": "Life Stages/Nutrition", "q": "At what age do puppies typically enter the primary socialization period, during which new experiences have the most lasting impact?", "options": ["Birth to 2 weeks", "3 to 14 weeks", "6 to 12 months", "1 to 2 years"], "answer": 1, "explain": "The primary socialization period in puppies is roughly 3\u201314 weeks of age. Positive experiences with people, animals, and environments during this window significantly reduce fear-based behavioral problems in adulthood."}, {"section": "Nursing/Radiography", "q": "A veterinary assistant is asked to help with a centesis procedure. This procedure involves:", "options": ["Suturing a wound closed", "Puncturing a body cavity with a needle to withdraw fluid", "Administering an enema", "Placing a feeding tube"], "answer": 1, "explain": "Centesis is the puncture of a body cavity or organ with a hollow needle to draw out fluid \u2014 examples include thoracocentesis (chest), abdominocentesis (abdomen), and cystocentesis (bladder)."}, {"section": "Career Prep", "q": "What is the primary purpose of an employee handbook in a veterinary practice?", "options": ["To replace verbal communication with clients", "To outline workplace policies, expectations, benefits, and procedures for staff", "To serve as a medical reference for clinical decisions", "To track client payments"], "answer": 1, "explain": "Employee handbooks outline workplace expectations, policies (attendance, conduct, safety), benefits, and procedures. They protect both the employer and employee by ensuring transparent, documented workplace standards."}, {"section": "Pharmacology", "q": "Convert 2.5 kilograms to grams.", "options": ["250 g", "25 g", "2,500 g", "25,000 g"], "answer": 2, "explain": "Multiply kilograms by 1,000 to get grams: 2.5 kg \u00d7 1,000 = 2,500 g."}, {"section": "Lab Procedures", "q": "When examining urine sediment microscopically, which finding is always considered abnormal?", "options": ["A few epithelial cells", "Rare red blood cells (< 5 per HPF)", "Bacteria", "Rare white blood cells"], "answer": 2, "explain": "Bacteria in urine sediment is always considered abnormal and suggests a urinary tract infection (UTI), especially if accompanied by white blood cells. Rare epithelial cells, a few RBCs, or occasional WBCs may be within normal limits."}, {"section": "Life Stages/Nutrition", "q": "Essential amino acids differ from non-essential amino acids in that essential amino acids:", "options": ["Are larger molecules", "Cannot be synthesized by the body and must be supplied through diet", "Are only needed by puppies and kittens", "Are found only in plant-based foods"], "answer": 1, "explain": "Essential amino acids cannot be synthesized in sufficient quantities by the body and must be obtained from the diet. Non-essential amino acids can be manufactured by the body from other compounds."}, {"section": "Pharmacology", "q": "A drug labeled 'Schedule III' under the Controlled Substances Act indicates it:", "options": ["Has no accepted medical use", "Has moderate to low potential for dependence and accepted medical use", "Is available over the counter", "Has the highest abuse potential of all schedules"], "answer": 1, "explain": "Schedule III drugs have accepted medical use and moderate to low potential for physical and psychological dependence \u2014 examples include ketamine and some anabolic steroids used in veterinary practice."}, {"section": "Lab Procedures", "q": "When preparing a blood smear for microscopic examination, the smear should be:", "options": ["Thick and cloudy to see more cells", "Thin enough to see individual cells clearly in the monolayer area", "Applied to a dirty slide for traction", "Fixed with formalin immediately"], "answer": 1, "explain": "A good blood smear has a feathered edge and a monolayer area where individual blood cells can be evaluated without overlapping. The monolayer region is where differential counts and morphology assessment are performed."}, {"section": "Pharmacology", "q": "Which of the following correctly describes an 'adverse drug reaction' vs. a normal 'side effect'?", "options": ["They are the same thing", "A side effect is any drug effect; an ADR specifically refers to an unintended harmful response at a therapeutic dose", "An ADR only occurs with overdose", "Side effects are always dangerous; ADRs are mild"], "answer": 1, "explain": "Side effects are any secondary effects (expected or unexpected) beyond the intended therapeutic effect. An ADR specifically denotes an unintended, harmful response occurring at a normal therapeutic dose."}, {"section": "Office Procedures", "q": "What does VCPR stand for and why does it matter?", "options": ["Veterinary Controlled Prescription Record \u2014 required for all drug orders", "Veterinarian-Client-Patient Relationship \u2014 legally required before prescribing or dispensing medication", "Veterinary Clinical Practice Regulation \u2014 a state licensing requirement", "Vaccine Compliance and Prevention Record \u2014 required for boarding facilities"], "answer": 1, "explain": "The VCPR (Veterinarian-Client-Patient Relationship) is a legal requirement before a veterinarian can prescribe or dispense medication. It requires that the vet has sufficient knowledge of the patient through a recent exam or clinic visit."}, {"section": "Lab Procedures", "q": "Which of the following is used to prepare a fecal flotation solution that causes eggs to float?", "options": ["Plain tap water", "A high specific gravity solution such as zinc sulfate or sodium nitrate", "Distilled water only", "Saline at 0.9% concentration"], "answer": 1, "explain": "Flotation solutions must have a specific gravity higher than that of parasite eggs (typically >1.18) so eggs float to the surface. Common solutions include zinc sulfate (SG ~1.18) and sodium nitrate (SG ~1.20)."}, {"section": "Pharmacology", "q": "A 30 kg dog requires a medication at 2 mg/kg. The drug is available as 10 mg/mL. How many mL should be given?", "options": ["3 mL", "6 mL", "60 mL", "0.6 mL"], "answer": 1, "explain": "Total dose: 2 mg/kg \u00d7 30 kg = 60 mg. Volume: 60 mg \u00f7 10 mg/mL = 6 mL."}, {"section": "Life Stages/Nutrition", "q": "Which of the following is considered a responsible pet ownership practice per AVMA guidelines?", "options": ["Allowing pets to roam freely outdoors unsupervised", "Providing regular preventive veterinary care including vaccines and parasite control", "Feeding pets a diet of table scraps only", "Breeding pets without regard to genetic health"], "answer": 1, "explain": "AVMA responsible pet ownership guidelines emphasize regular veterinary care, proper nutrition, identification (microchip/tag), parasite prevention, and humane treatment as core owner responsibilities."}, {"section": "Life Stages/Nutrition", "q": "Which breed is classified as a giant breed dog?", "options": ["Chihuahua", "Beagle", "Great Dane", "Shih Tzu"], "answer": 2, "explain": "Great Danes are one of the largest dog breeds, classified as giant breeds. Giant breeds have unique nutritional needs (controlled calcium/phosphorus ratios during growth) and are predisposed to certain conditions like bloat (GDV)."}, {"section": "Lab Procedures", "q": "A fecal flotation test comes back positive for Toxocara canis eggs. What does this mean?", "options": ["The dog has heartworms", "The dog has roundworms", "The dog has tapeworms", "The dog has coccidia"], "answer": 1, "explain": "Toxocara canis is the common canine roundworm (ascarid). Its eggs are identified on fecal flotation and the finding indicates an intestinal roundworm infestation requiring treatment. It also has zoonotic potential (visceral larva migrans in humans)."}, {"section": "Life Stages/Nutrition", "q": "What is the approximate gestation period for dogs?", "options": ["45 days", "63 days", "90 days", "30 days"], "answer": 1, "explain": "The canine gestation period is approximately 63 days from ovulation (or about 57 days from the first day of cytologic diestrus). This is a commonly tested fact in life stages content."}, {"section": "Life Stages/Nutrition", "q": "Cats are described as 'induced ovulators,' meaning:", "options": ["They ovulate on a fixed monthly schedule", "Ovulation is triggered by the act of mating", "They ovulate continuously year-round", "They only ovulate after 6 months of age regardless of mating"], "answer": 1, "explain": "Unlike dogs (spontaneous ovulators), cats are induced ovulators \u2014 ovulation is triggered by the physical stimulus of mating. Without mating, cats may continue cycling repeatedly through the breeding season."}, {"section": "Career Prep", "q": "Which of the following describes professional behavior in a veterinary workplace?", "options": ["Discussing personal disagreements with coworkers in front of clients", "Maintaining confidentiality, being punctual, and communicating respectfully", "Sharing patient information with friends outside work", "Ignoring tasks outside your immediate job description"], "answer": 1, "explain": "Professionalism includes confidentiality, reliability, respectful communication, and a team-oriented approach. Discussing internal disagreements in front of clients and sharing patient info externally are serious professional and ethical violations."}, {"section": "Office Procedures", "q": "What is the primary legal purpose of obtaining a client's informed consent before a procedure?", "options": ["To protect the veterinary team from all liability in any outcome", "To document that the client was educated about the procedure, risks, and alternatives before agreeing to proceed", "To ensure payment is collected upfront", "To allow the assistant to perform the procedure independently"], "answer": 1, "explain": "Informed consent documents that the client received and understood information about the procedure, risks, alternatives, and expected outcomes before agreeing. It is both an ethical and legal requirement in veterinary practice."}, {"section": "Nursing/Radiography", "q": "What is the primary purpose of a urinary catheter in a veterinary patient?", "options": ["To deliver IV fluids", "To drain urine from the bladder, especially when a patient cannot urinate voluntarily", "To administer medications directly to the kidneys", "To measure blood pressure"], "answer": 1, "explain": "Urinary catheters drain urine from the bladder in patients unable to urinate voluntarily (e.g., urethral obstruction, neurologic dysfunction, post-surgical monitoring) and can also be used to collect sterile urine samples."}, {"section": "Nursing/Radiography", "q": "The purpose of a dosimetry badge worn by radiology personnel is to:", "options": ["Identify which staff member took the x-ray", "Monitor cumulative radiation exposure over time", "Protect the wearer from radiation", "Alert staff when the x-ray machine is on"], "answer": 1, "explain": "Dosimetry badges (radiation monitoring badges) track cumulative personal radiation exposure over time. They are submitted regularly for analysis to ensure staff exposure stays within safe limits."}, {"section": "Pharmacology", "q": "Which of the following household measurement conversions is correct?", "options": ["1 tablespoon = 3 teaspoons", "1 teaspoon = 10 mL", "1 tablespoon = 10 mL", "1 cup = 100 mL"], "answer": 0, "explain": "1 tablespoon = 3 teaspoons. Other key conversions: 1 teaspoon \u2248 5 mL, 1 tablespoon \u2248 15 mL, 1 cup \u2248 240 mL. These conversions are frequently tested in veterinary pharmacology math."}, {"section": "Nursing/Radiography", "q": "When should an Elizabethan collar (E-collar) be used?", "options": ["During all radiograph procedures", "To prevent a patient from licking, biting, or scratching a wound or surgical site", "Only for aggressive animals", "As a substitute for muzzling"], "answer": 1, "explain": "E-collars prevent patients from accessing wounds, suture lines, bandages, or irritated areas. They are a key nursing tool in post-operative and wound care management."}, {"section": "Career Prep", "q": "Which of the following best describes how to handle a situation where you made a mistake that affected a patient?", "options": ["Ignore it and hope no one notices", "Report it immediately to your supervisor, document it accurately, and participate in corrective steps", "Blame it on a coworker", "Wait and see if the patient recovers before mentioning it"], "answer": 1, "explain": "Reporting errors promptly is a fundamental professional and ethical obligation. Early disclosure allows for immediate corrective action, protects the patient, and reflects the honesty and accountability expected of all veterinary team members."}, {"section": "Office Procedures", "q": "Client records in a veterinary practice must be maintained for a minimum period defined by:", "options": ["The practice owner's personal preference", "State veterinary practice acts and regulations", "Federal tax law only", "The preference of the attending veterinarian"], "answer": 1, "explain": "State veterinary practice acts and regulations define minimum record retention periods (commonly 3\u20137 years depending on the state). Practices must comply with these legal requirements."}, {"section": "Life Stages/Nutrition", "q": "Which essential nutrient plays the most critical role in nearly all bodily functions and must be provided constantly?", "options": ["Vitamin D", "Calcium", "Water", "Iron"], "answer": 2, "explain": "Water is the most critical nutrient \u2014 it participates in virtually every physiologic process. Animals can survive weeks without food but only days without water, making it the highest priority dietary component."}, {"section": "Office Procedures", "q": "Which of the following correctly describes the role of a veterinary technician versus a veterinary assistant in most states?", "options": ["Both roles have identical legal authority", "Veterinary technicians are credentialed and may perform more advanced clinical tasks; assistants perform supportive tasks under supervision", "Veterinary assistants have more authority than technicians", "Technicians cannot perform any hands-on tasks"], "answer": 1, "explain": "In most states, credentialed veterinary technicians (LVT/RVT/CVT) have passed the VTNE and may perform more advanced clinical tasks like anesthesia monitoring and IV catheter placement. Assistants perform supportive tasks under supervision."}, {"section": "Nursing/Radiography", "q": "Capillary refill time (CRT) is assessed by pressing on the gums and measuring how long it takes for color to return. A normal CRT is:", "options": ["Less than 2 seconds", "3\u20134 seconds", "5\u20136 seconds", "More than 7 seconds"], "answer": 0, "explain": "A normal CRT is less than 2 seconds (typically 1\u20131.5 seconds). CRT greater than 2 seconds suggests poor perfusion and may indicate dehydration or shock."}, {"section": "Office Procedures", "q": "The AVMA's principles of veterinary medical ethics emphasize which of the following as a core obligation?", "options": ["Maximizing profit above all else", "The welfare of animals and the public, along with honest dealings with clients, colleagues, and the public", "Performing procedures only if they are profitable", "Avoiding communication with clients about risks"], "answer": 1, "explain": "The AVMA's ethical principles center on animal welfare, public health, honesty, and professional integrity. Veterinary professionals are expected to act in the best interest of the patient while maintaining honest, transparent relationships with clients and colleagues."}, {"section": "Nursing/Radiography", "q": "Which of the following best describes the purpose of fluid therapy in a dehydrated patient?", "options": ["To provide nutrition", "To restore circulating fluid volume and correct electrolyte imbalances", "To sedate the patient", "To replace blood lost during surgery only"], "answer": 1, "explain": "Fluid therapy restores circulating volume, corrects dehydration, and helps normalize electrolyte and acid-base balance. It supports organ perfusion and is a cornerstone of supportive care."}, {"section": "Pharmacology", "q": "Convert 750 mL to liters.", "options": ["7.5 L", "75 L", "0.75 L", "0.075 L"], "answer": 2, "explain": "Divide mL by 1,000 to convert to liters: 750 \u00f7 1,000 = 0.75 L."}, {"section": "Life Stages/Nutrition", "q": "The term 'estrus' refers to:", "options": ["The period of pregnancy", "The phase of the reproductive cycle when a female is sexually receptive and fertile", "The surgical removal of the ovaries", "The period immediately after giving birth"], "answer": 1, "explain": "Estrus is the phase of the estrous cycle during which the female is sexually receptive and fertile (commonly called 'heat'). It is when ovulation occurs and mating is most likely to result in pregnancy."}, {"section": "Life Stages/Nutrition", "q": "Which of the following is an example of normal feline behavior?", "options": ["Excessive vocalization every hour with no environmental trigger", "Grooming, scratching on surfaces, and hiding when stressed", "Persistent, unprovoked aggression toward all people", "Complete refusal to eat for more than 5 days"], "answer": 1, "explain": "Grooming, scratching, and hiding when stressed are all normal feline behaviors. Cats hide as a coping mechanism and should be provided with hiding spaces in their environment. The other options suggest medical or behavioral problems."}, {"section": "Lab Procedures", "q": "Which test is used to identify external parasites such as mites?", "options": ["Fecal flotation", "Skin scraping", "Urinalysis", "Blood smear"], "answer": 1, "explain": "Skin scrapings are used to collect material from the skin surface or hair follicles to identify external parasites like Demodex (deep scrape) or Sarcoptes (superficial scrape) mites under microscopy."}, {"section": "Lab Procedures", "q": "Proper documentation of laboratory results in the medical record should occur:", "options": ["Only if the results are abnormal", "As soon as results are available, for every patient", "Only at annual wellness exams", "At the end of the month during record review"], "answer": 1, "explain": "All laboratory results \u2014 normal or abnormal \u2014 should be recorded in the medical record promptly after receipt. This supports continuity of care, allows trend tracking, and fulfills legal documentation requirements."}, {"section": "Life Stages/Nutrition", "q": "Which of the following is a core feline vaccine in addition to rabies?", "options": ["FeLV (feline leukemia)", "FIV", "FVRCP (feline viral rhinotracheitis, calicivirus, panleukopenia)", "Chlamydophila"], "answer": 2, "explain": "FVRCP and rabies are the two core feline vaccines. FeLV is non-core (recommended for outdoor or at-risk cats). FIV and Chlamydophila are also non-core."}, {"section": "Career Prep", "q": "Which of the following is an example of proper email or written communication in a professional setting?", "options": ["Using all caps and abbreviations informally in client communications", "Clear, respectful language, correct spelling, a professional greeting and closing, and appropriate tone", "Forwarding client records via personal email", "Using social media to communicate medical information to clients"], "answer": 1, "explain": "Professional written communication uses clear, respectful language, proper spelling and grammar, appropriate greeting/closing, and maintains confidentiality. Client medical information should only be communicated through secure, approved channels."}, {"section": "Life Stages/Nutrition", "q": "Taurine is an amino acid that is especially important in cat nutrition because cats:", "options": ["Produce too much taurine on their own", "Cannot synthesize adequate taurine and must obtain it from diet \u2014 deficiency causes heart disease and blindness", "Use taurine only for coat health", "Do not need taurine at any life stage"], "answer": 1, "explain": "Unlike dogs, cats cannot synthesize adequate taurine from other amino acids. Taurine deficiency in cats leads to dilated cardiomyopathy (DCM) and central retinal degeneration, making it an essential dietary nutrient for cats."}, {"section": "Office Procedures", "q": "Which of the following is the correct definition of 'negligence' in a veterinary context?", "options": ["Intentionally harming a patient", "A practitioner's failure to meet the standard of care expected of a reasonably competent professional", "Disagreeing with a client's decision", "Declining to treat a patient outside your scope"], "answer": 1, "explain": "Negligence is the failure to provide the level of care that a reasonably competent professional in the same field would provide under similar circumstances \u2014 resulting in harm to the patient. It differs from intentional harm (malpractice)."}, {"section": "Pharmacology", "q": "The term 'bioavailability' refers to:", "options": ["The toxicity level of a drug", "The fraction of an administered drug that reaches systemic circulation unchanged", "How quickly a drug is eliminated", "The drug's brand name"], "answer": 1, "explain": "Bioavailability is the proportion of an administered dose that reaches the systemic circulation in active form. IV administration has 100% bioavailability; oral routes are typically less due to first-pass metabolism."}, {"section": "Nursing/Radiography", "q": "Which of the following is a sign of pain in a dog that a veterinary assistant should report?", "options": ["Wagging tail during exam", "Eating and drinking normally", "Reluctance to move, guarding a body part, or vocalization when touched", "Sleeping soundly through the night"], "answer": 2, "explain": "Pain indicators in dogs include reluctance to bear weight, guarding or protecting an area, vocalization when the area is touched or moved, restlessness, decreased appetite, and changes in posture or behavior."}, {"section": "Nursing/Radiography", "q": "A cat's temperature is taken rectally and reads 103.5\u00b0F. This is best described as:", "options": ["Hypothermic \u2014 below normal", "Normal \u2014 within acceptable range", "Mildly hyperthermic \u2014 above normal", "Critically high \u2014 emergency level"], "answer": 2, "explain": "Normal feline rectal temperature is approximately 100\u2013102\u00b0F (38\u201339\u00b0C). A reading of 103.5\u00b0F is above normal and considered mildly febrile/hyperthermic, warranting monitoring and reporting to the veterinarian."}, {"section": "Nursing/Radiography", "q": "When bandaging a limb, you should always check which of the following regularly?", "options": ["The color of the bandage", "Digits (toes) distal to the bandage for warmth, swelling, and sensation", "Whether the bandage looks neat from a distance", "Only check if the patient chews at the bandage"], "answer": 1, "explain": "Digits distal to a bandage should be checked regularly for signs of impaired circulation (cold, swollen, or numb toes), which indicate the bandage may be too tight and could cause tissue damage."}, {"section": "Nursing/Radiography", "q": "Which positioning is used for a thoracic radiograph to best evaluate the heart and lungs in a lateral view?", "options": ["Dorsoventral with patient standing", "Right or left lateral recumbency with forelimbs extended cranially", "Oblique with patient sitting", "Ventrodorsal with patient in sternal recumbency"], "answer": 1, "explain": "For a lateral thoracic radiograph, the patient is placed in lateral recumbency (either right or left lateral) with the forelimbs pulled cranially to move the triceps muscles away from the chest, improving visualization of the cranial thorax."}, {"section": "Pharmacology", "q": "When providing a client with directions for a dispensed medication, which of the following is the veterinary assistant's appropriate role?", "options": ["Independently counsel the client on which drug is best for the animal", "Read the label d
