dures."}, {"term": "informed consent", "def": "A person's agreement to allow a medical treatment or procedure based on full disclosure of facts necessary to make an intelligent decision."}, {"term": "antagonist", "def": "A drug or chemical substance that opposes or blocks the action of another substance, often by combining with and blocking a receptor."}, {"term": "third-intention healing", "def": "Treatment of a grossly contaminated wound by delaying surgical closure until contamination has been markedly reduced."}, {"term": "veterinary assistant", "def": "A person with the training of a clinical aide, less than that required of a veterinary technician."}, {"term": "veterinarian", "def": "A person who has graduated from a 4-year AVMA-accredited program and received a Doctor of Veterinary Medicine (DVM) degree."}, {"term": "polycythemia", "def": "An increase in the number of circulating erythrocytes."}, {"term": "Rochester-Carmalt forceps", "def": "A large crushing instrument often used to control large tissue bundles."}, {"term": "Senn (rake) retractor", "def": "Double-ended retractor, one end with fingerlike curved prongs and the other end with a flat curved blade."}, {"term": "disinfectants", "def": "Chemical agents that kill or prevent the growth of microorganisms on inanimate objects."}, {"term": "pollakiuria", "def": "Increase in the frequency of urination."}, {"term": "malpractice", "def": "A type of negligence in which a practitioner fails to follow generally accepted professional standards, causing injury to the patient."}, {"term": "flowmeter", "def": "Part of the anesthetic machine that measures and delivers a constant gas flow to the vaporizer, common gas outlet, and breathing circuit."}, {"term": "body condition scoring", "def": "Method of subjectively quantifying subcutaneous body fat reserves."}, {"term": "Crile forceps", "def": "Hemostatic forceps with transverse serrations that extend the entire jaw length."}, {"term": "first-intention (primary) healing", "def": "The healing of injured tissue directly without intervention of granulation tissue."}, {"term": "closed-suction drain", "def": "Drain that uses vacuum bottles and plastic conduits to draw fluid away from the wound by producing negative pressure."}, {"term": "dosage form", "def": "The form in which a drug is supplied \u2014 solid, semisolid, or liquid."}, {"term": "thrombocytopenia", "def": "Decrease in circulating platelets."}, {"term": "buffy coat", "def": "A layer of material above packed erythrocytes following centrifugation; consists primarily of leukocytes and thrombocytes."}, {"term": "definitive host", "def": "The host that harbors the adult, mature, or sexual stages of a parasite."}, {"term": "topical application", "def": "Applied onto the skin."}, {"term": "plain surgical gut", "def": "A suture material made from the submucosa of sheep intestines or serosa of bovine intestines."}, {"term": "silk suture", "def": "Braided, multifilament, organic, nonabsorbable suture material."}, {"term": "esophageal stethoscope", "def": "An instrument placed in the esophagus at the level of the heart during anesthesia to amplify and monitor the heartbeat."}, {"term": "osteotome", "def": "An instrument designed to cut or shape bone and cartilage."}, {"term": "Kelly forceps", "def": "Hemostatic forceps with transverse serrations that extend over only the distal portion of the jaws."}, {"term": "intermediate host", "def": "The host that harbors the larval, immature, or asexual stages of a parasite."}, {"term": "excretion", "def": "The removal of a drug from the body."}, {"term": "hemolysis", "def": "The rupture of a red blood cell; destruction of erythrocytes."}, {"term": "lateral recumbency", "def": "A restraint technique in which the animal is held resting on the side of the body."}, {"term": "hypoxemia", "def": "Deficiency in the amount of oxygen reaching body tissues."}, {"term": "neutropenia", "def": "Abnormal decrease in the number of neutrophils in a peripheral blood sample."}, {"term": "multifilament suture", "def": "A suture made of several strands of material twisted or braided together; more pliable and flexible than monofilament."}, {"term": "endoparasite", "def": "A parasite that resides within a host's tissues."}, {"term": "Mayo stand", "def": "An instrument stand that is movable and has a removable tray top."}, {"term": "prescription", "def": "An order from a licensed veterinarian directing a pharmacist to prepare a drug for use in a client's animal."}, {"term": "mosquito hemostat", "def": "A small hemostatic forceps with transverse jaw serrations."}, {"term": "Mathieu needle holder", "def": "Needle holder with a ratchet lock at the proximal end of the handles, permitting locking and unlocking with a progressive squeeze."}, {"term": "subtherapeutic level", "def": "A dose that leaves a drug below the ideal range of concentration, so the beneficial effect is not achieved."}, {"term": "granulation tissue", "def": "Highly vascularized connective tissue produced after extensive tissue damage."}, {"term": "American Animal Hospital Association (AAHA)", "def": "An organization that has set standards for veterinary practice facilities."}, {"term": "aseptic technique", "def": "All precautions taken to prevent contamination and ultimately infection."}, {"term": "chromic surgical gut", "def": "Surgical gut suture exposed to chrome or aldehyde to slow absorption."}, {"term": "tachypnea", "def": "Rapid breathing."}, {"term": "negligence", "def": "A finding that a practitioner's actions were below the level of competence expected of the professional."}, {"term": "adverse drug reaction", "def": "An unintended and harmful response to a medication given at a normal dose (related concept, paired with the glossary's pharmacology terms)."}, {"term": "suture scissors", "def": "Scissors with a concavity at the top of one blade, designed for removing skin sutures after wound healing."}, {"term": "antiseptic", "def": "Chemical agent that kills or prevents the growth of microorganisms on living tissue."}];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

// ── Quiz state ────────────────────────────────────────────────────────────
const quiz = { deck: [], idx: 0, score: 0, ans: null, stats: {}, done: false, label: '', source: null };

function startQuiz(questions, label, source) {
  quiz.deck = shuffle(questions);
  quiz.idx = 0; quiz.score = 0; quiz.ans = null; quiz.done = false;
  quiz.label = label; quiz.source = source || questions;
  quiz.stats = {};
  quiz.deck.forEach(q => { if (!quiz.stats[q.section]) quiz.stats[q.section] = { c: 0, t: 0 }; });
  screen = 'quiz';
  render();
}

// ── Flashcard state ───────────────────────────────────────────────────────
const fc = { deck: [], idx: 0, flipped: false, known: 0, learning: 0 };

function startFlashcards() {
  fc.deck = shuffle(FLASHCARDS);
  fc.idx = 0; fc.flipped = false; fc.known = 0; fc.learning = 0;
  screen = 'flashcards';
  render();
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const app = root();
  app.innerHTML = '';
  if (screen === 'home') renderHome(app);
  else if (screen === 'exam-menu') renderExamMenu(app);
  else if (screen === 'quiz') renderQuiz(app);
  else if (screen === 'flashcards') renderFlashcards(app);
}

// HOME
function renderHome(app) {
  const modes = [
    { title: 'Flashcards', sub: FLASHCARDS.length + ' terms · flip to reveal definition · track what you know', fn: () => startFlashcards() },
    { title: 'Quick 10', sub: 'Random 10-question pull across all 280 questions', fn: () => { const pool = shuffle([...EXAM1,...EXAM2,...EXAM3]).slice(0,10); startQuiz(pool, 'Quick 10', null); } },
    { title: 'Practice Exams', sub: 'Choose from Exam 1, 2, or 3 — 80–100 questions each', fn: () => { screen = 'exam-menu'; render(); } },
  ];
  modes.forEach(m => {
    const btn = el('button', 'mode-btn');
    btn.innerHTML = '<div class="mode-title">' + m.title + '</div><div class="mode-sub">' + m.sub + '</div>';
    btn.onclick = m.fn;
    app.appendChild(btn);
  });
}

// EXAM MENU
function renderExamMenu(app) {
  const back = el('button', 'back-btn', '← Back');
  back.onclick = () => { screen = 'home'; render(); };
  app.appendChild(back);

  const exams = [
    { title: 'Exam 1', sub: '100 questions · Lab, Office, Life Stages, Nursing, Pharmacology, Surgery', data: EXAM1, label: 'Exam 1' },
    { title: 'Exam 2', sub: '100 questions · Heavier on Pharmacology math, Nursing & Radiography, Career Prep', data: EXAM2, label: 'Exam 2' },
    { title: 'Exam 3 — Workbook Edition', sub: '80 questions · Medical Terminology + workbook-sourced content', data: EXAM3, label: 'Exam 3' },
  ];
  exams.forEach(e => {
    const btn = el('button', 'exam-choice');
    btn.innerHTML = '<div class="ec-title">' + e.title + '</div><div class="ec-sub">' + e.sub + '</div>';
    btn.onclick = () => startQuiz(e.data, e.label, e.data);
    app.appendChild(btn);
  });
}

// QUIZ
function renderQuiz(app) {
  if (quiz.done) { renderResults(app); return; }
  const q = quiz.deck[quiz.idx], tot = quiz.deck.length;
  const pct = Math.round(quiz.idx / tot * 100);

  const back = el('button', 'back-btn', '← Back to menu');
  back.onclick = () => { screen = 'home'; render(); };
  app.appendChild(back);

  const prow = el('div', 'progress-row');
  prow.innerHTML = '<span>Question ' + (quiz.idx + 1) + ' of ' + tot + '</span><span>' + q.section + '</span>';
  app.appendChild(prow);

  const bar = el('div', 'progress-bar');
  const fill = el('div', 'progress-fill');
  fill.style.width = pct + '%';
  bar.appendChild(fill);
  app.appendChild(bar);

  app.appendChild(el('div', 'score-line', 'Score: ' + quiz.score + '/' + (quiz.idx + (quiz.ans !== null ? 1 : 0))));
  app.appendChild(el('p', 'q-text', q.q));

  q.options.forEach((opt, i) => {
    const btn = el('button', 'opt-btn');
    btn.innerHTML = '<strong>' + String.fromCharCode(65 + i) + '.</strong> ' + opt;
    if (quiz.ans !== null) {
      btn.disabled = true;
      if (i === q.answer) btn.classList.add('opt-correct');
      else if (i === quiz.ans && i !== q.answer) btn.classList.add('opt-wrong');
    } else {
      btn.onclick = () => answerQuiz(i);
    }
    app.appendChild(btn);
  });

  if (quiz.ans !== null) {
    const ok = quiz.ans === q.answer;
    const fb = el('div', 'feedback ' + (ok ? 'feedback-correct' : 'feedback-wrong'));
    fb.appendChild(el('p', 'feedback-label ' + (ok ? 'label-correct' : 'label-wrong'), ok ? 'Correct' : 'Not quite'));
    fb.appendChild(el('p', 'feedback-explain', q.explain));
    app.appendChild(fb);
    const nxt = el('button', 'next-btn', quiz.idx === tot - 1 ? 'See final results' : 'Next question');
    nxt.onclick = nextQuiz;
    app.appendChild(nxt);
  }
}

function answerQuiz(i) {
  if (quiz.ans !== null) return;
  quiz.ans = i;
  const q = quiz.deck[quiz.idx];
  quiz.stats[q.section].t++;
  if (i === q.answer) { quiz.score++; quiz.stats[q.section].c++; }
  render();
}

function nextQuiz() {
  if (quiz.idx === quiz.deck.length - 1) { quiz.done = true; render(); return; }
  quiz.idx++; quiz.ans = null;
  render(); scrollTop();
}

// RESULTS
function renderResults(app) {
  const tot = quiz.deck.length, pct = Math.round(quiz.score / tot * 100), passed = pct >= 77;
  const isShort = tot < 50;

  const back = el('button', 'back-btn', '← Back to menu');
  back.onclick = () => { screen = 'home'; render(); };
  app.appendChild(back);

  const rs = el('div', 'results-score');
  rs.innerHTML =
    '<p style="font-size:13px;color:var(--text-muted);margin-bottom:4px;">Final score — ' + quiz.label + '</p>' +
    '<p class="big-pct ' + (passed ? 'pass' : 'fail') + '">' + pct + '%</p>' +
    '<p class="results-sub">' + quiz.score + ' of ' + tot + ' correct' + (!isShort ? ' · need 77% to pass' : '') + '</p>' +
    (!isShort ? '<p class="results-verdict ' + (passed ? 'pass' : 'fail') + '">' + (passed ? 'Passing score!' : 'Below passing threshold') + '</p>' : '');
  app.appendChild(rs);

  const secHead = el('p', '', 'Breakdown by section');
  secHead.style.cssText = 'font-size:13px;color:var(--text-muted);margin:1.5rem 0 8px;';
  app.appendChild(secHead);

  Object.entries(quiz.stats).forEach(([sec, s]) => {
    if (!s.t) return;
    const p = Math.round(s.c / s.t * 100);
    const col = p >= 77 ? 'var(--green-text)' : (p >= 60 ? 'var(--amber)' : 'var(--red-text)');
    const row = el('div', 'section-row');
    row.innerHTML = '<span class="section-label">' + sec + '</span><span style="font-weight:600;color:' + col + ';">' + s.c + '/' + s.t + ' (' + p + '%)</span>';
    app.appendChild(row);
  });

  const retake = el('button', 'retake-btn', 'Retake with reshuffled questions');
  retake.onclick = () => {
    const src = quiz.source || quiz.deck;
    startQuiz(src, quiz.label, quiz.source);
  };
  app.appendChild(retake);
}

// FLASHCARDS
function renderFlashcards(app) {
  if (fc.idx >= fc.deck.length) {
    const back = el('button', 'back-btn', '← Back to menu');
    back.onclick = () => { screen = 'home'; render(); };
    app.appendChild(back);
    const done = el('div', 'fc-done');
    done.innerHTML = '<p class="fc-done-title">Deck complete!</p><p class="fc-done-sub">Got it: ' + fc.known + ' · Still learning: ' + fc.learning + '</p>';
    const restart = el('button', 'restart-btn', 'Shuffle and restart deck');
    restart.onclick = startFlashcards;
    done.appendChild(restart);
    app.appendChild(done);
    return;
  }

  const back = el('button', 'back-btn', '← Back to menu');
  back.onclick = () => { screen = 'home'; render(); };
  app.appendChild(back);

  const tot = fc.deck.length, pct = Math.round(fc.idx / tot * 100);
  const prow = el('div', 'progress-row');
  prow.innerHTML = '<span>Card ' + (fc.idx + 1) + ' of ' + tot + '</span><span>Got it: ' + fc.known + ' · Learning: ' + fc.learning + '</span>';
  app.appendChild(prow);

  const bar = el('div', 'progress-bar');
  const fill = el('div', 'progress-fill');
  fill.style.width = pct + '%';
  bar.appendChild(fill);
  app.appendChild(bar);

  const card = fc.deck[fc.idx];
  const fcard = el('div', 'flashcard');
  fcard.onclick = () => { fc.flipped = !fc.flipped; render(); };
  if (!fc.flipped) {
    fcard.innerHTML = '<p class="card-eyebrow">Term</p><p class="card-term">' + card.term + '</p><p class="card-hint">Tap to reveal definition</p>';
  } else {
    fcard.innerHTML = '<p class="card-eyebrow">Definition</p><p class="card-def">' + card.def + '</p>';
  }
  app.appendChild(fcard);

  if (fc.flipped) {
    const acts = el('div', 'fc-actions');
    const learning = el('button', 'fc-learning', 'Still learning');
    learning.onclick = () => { fc.learning++; fc.idx++; fc.flipped = false; render(); };
    const gotit = el('button', 'fc-gotit', 'Got it ✓');
    gotit.onclick = () => { fc.known++; fc.idx++; fc.flipped = false; render(); };
    acts.appendChild(learning);
    acts.appendChild(gotit);
    app.appendChild(acts);
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
