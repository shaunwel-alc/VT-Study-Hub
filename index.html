const QUESTIONS = [{"section": "Surgery/Aseptic", "q": "Needle holders are primarily used to:", "options": ["Cut tissue", "Grasp and manipulate curved suture needles", "Retract the surgical site", "Suction fluid"], "answer": 1, "explain": "Needle holders (e.g., Mayo-Hegar, Olsen-Hegar) are designed specifically to grasp and control curved suture needles during wound closure."}, {"section": "Surgery/Aseptic", "q": "According to AAHA recommendations, a surgical facility should ideally have three distinct areas. Which of the following is one of them?", "options": ["Waiting room", "Preparation area", "Front desk", "Pharmacy storage closet"], "answer": 1, "explain": "AAHA recommends three distinct areas: the preparation area, the scrub area, and the surgery room itself, each serving a different role in maintaining asepsis."}, {"section": "Nursing/Radiography", "q": "For radiographic positioning, the term 'ventrodorsal' (VD) refers to:", "options": ["The patient lying on its side with the beam passing side to side", "The patient lying on its back with the beam entering ventrally and exiting dorsally", "A standing lateral view", "A view of only the limb"], "answer": 1, "explain": "Ventrodorsal positioning has the patient in dorsal recumbency (on its back), with the x-ray beam passing from the ventral surface through to the dorsal surface."}, {"section": "Pharmacology", "q": "How many liters are in 525 mL?", "options": ["0.525 L", "5.25 L", "52.5 L", "0.0525 L"], "answer": 0, "explain": "Divide mL by 1000 to convert to liters: 525 \u00f7 1000 = 0.525 L."}, {"section": "Pharmacology", "q": "Which task may a veterinary assistant typically NOT perform regarding dispensing medication?", "options": ["Labeling a container with information provided by the veterinarian", "Choosing the appropriate medication and dose for the patient", "Handing a properly labeled prescription to the client per veterinarian instruction", "Providing directions for use as written by the veterinarian"], "answer": 1, "explain": "Selecting the medication and calculating dosing are clinical decisions reserved for the veterinarian (or technician under specific delegation), not the assistant."}, {"section": "Nursing/Radiography", "q": "Intravenous fluid therapy is generally chosen over subcutaneous fluids when:", "options": ["The patient needs rapid correction of significant dehydration or shock", "The patient is mildly dehydrated and stable", "Cost needs to be minimized", "The patient is fully hydrated"], "answer": 0, "explain": "IV fluids allow rapid, controlled, and more substantial volume delivery, making them appropriate for moderate to severe dehydration, shock, or critical patients."}, {"section": "Nursing/Radiography", "q": "A common intramuscular injection site in dogs and cats is the:", "options": ["Lumbar epaxial muscles or the caudal thigh muscles", "The cornea", "The footpad", "The nose"], "answer": 0, "explain": "Common IM sites include the epaxial (lumbar) muscles and caudal thigh muscles (with caution near the sciatic nerve), chosen for adequate muscle mass."}, {"section": "Anatomy", "q": "The axial skeleton is composed of the bones of the:", "options": ["Limbs only", "Skull, spinal column, ribs, and sternum", "Pelvis only", "Tail only"], "answer": 1, "explain": "The axial skeleton runs along the body's midline and includes the skull, vertebral column, ribs, and sternum, distinct from the appendicular skeleton (limbs)."}, {"section": "Pharmacology", "q": "Which best differentiates general anesthesia from local anesthesia?", "options": ["General anesthesia only affects a small area; local affects the whole body", "General anesthesia causes full unconsciousness; local anesthesia numbs a specific area while the patient remains conscious", "They are identical in effect", "Local anesthesia always requires intubation"], "answer": 1, "explain": "General anesthesia produces total unconsciousness and loss of sensation throughout the body, while local anesthesia blocks sensation in a specific area without affecting consciousness."}, {"section": "Pharmacology", "q": "Which of the following should NOT happen even when a valid VCPR exists?", "options": ["Refilling a prescription after appropriate reassessment", "Prescribing a medication for a condition the veterinarian has never evaluated in that patient and has no records for", "Discussing side effects with the client", "Documenting the prescription in the medical record"], "answer": 1, "explain": "Even with a valid VCPR for general care, prescribing medication for an unrelated or unevaluated condition without proper assessment is inappropriate and can violate prescribing standards."}, {"section": "Anatomy", "q": "Which type of joint allows free movement in multiple directions, such as the elbow or hip?", "options": ["Fibrous joint", "Cartilaginous joint", "Synovial (diarthrodial) joint", "Sutures of the skull"], "answer": 2, "explain": "Synovial (diarthrodial) joints are freely movable and lubricated by synovial fluid, allowing motions such as flexion, extension, and rotation."}, {"section": "Nursing/Radiography", "q": "When placing a cat into a cage, which practice is safest?", "options": ["Place the cat in head-first while supporting the hindquarters", "Toss the cat in quickly to avoid scratches", "Hold only the tail while placing the cat in the cage", "Open the cage door fully and let the cat enter on its own without supervision"], "answer": 0, "explain": "Cats should be supported and placed gently head-first into the cage, maintaining control of the body to prevent injury to the animal or handler."}, {"section": "Pharmacology", "q": "A valid Veterinarian-Client-Patient Relationship (VCPR) is required before a veterinarian can:", "options": ["Prescribe or dispense medication for a patient", "Greet a new client", "Schedule an appointment", "Answer general questions about pet care"], "answer": 0, "explain": "A valid VCPR (the vet has recently examined or has sufficient knowledge of the patient, and is available for follow-up) is legally required before prescribing or dispensing medication."}, {"section": "Life Stages/Nutrition", "q": "Which nutrient is considered the most critical for survival, with even short-term deprivation being dangerous?", "options": ["Water", "Fiber", "Vitamin C", "Calcium"], "answer": 0, "explain": "Water is essential for nearly every physiological process; animals can survive far longer without food than without water."}, {"section": "Life Stages/Nutrition", "q": "Minerals such as calcium and phosphorus are primarily important for:", "options": ["Energy production only", "Bone and skeletal health, among other functions", "Coat color", "Digestion of fiber exclusively"], "answer": 1, "explain": "Calcium and phosphorus are key minerals for skeletal structure, with additional roles in nerve and muscle function."}, {"section": "Life Stages/Nutrition", "q": "Which of the following canine breeds is classified as a working breed?", "options": ["Siberian Husky", "Beagle", "Chihuahua", "Poodle (toy)"], "answer": 0, "explain": "The Siberian Husky is part of the AKC Working Group, historically bred for sledding and labor tasks, distinct from hound, toy, or non-sporting groups."}, {"section": "Office Procedures", "q": "A client calls upset about their bill and uses harsh language with the front desk staff. What is the most appropriate response?", "options": ["Hang up immediately", "Argue back to defend the practice", "Remain calm, listen, and address their concern professionally", "Ignore the call"], "answer": 2, "explain": "Professional client communication standards call for staying calm and addressing concerns respectfully, even when clients are upset, to de-escalate and maintain trust."}, {"section": "Lab Techniques", "q": "Fecal flotation is primarily used to diagnose:", "options": ["Bacterial skin infections", "Internal parasites", "Urinary tract infections", "Anemia"], "answer": 1, "explain": "Fecal flotation uses a solution with a specific gravity that causes parasite eggs/oocysts to float to the surface, allowing identification of intestinal parasites."}, {"section": "Pharmacology", "q": "A medication is available as 3g/10mL. The doctor orders 9g. How many mL will be prepared?", "options": ["10 mL", "20 mL", "30 mL", "3 mL"], "answer": 2, "explain": "Set up a proportion: 3g/10mL = 9g/x mL. Cross-multiply: 3x = 90, so x = 30 mL."}, {"section": "Lab Techniques", "q": "When labeling a laboratory sample, which piece of information is essential to include?", "options": ["Only the date", "Only the veterinarian's name", "Patient name, owner name, date, and source of sample", "Only the test requested"], "answer": 2, "explain": "Proper labeling requires enough identifying information to prevent mix-ups: patient and owner name, date collected, and the sample source/type at minimum."}, {"section": "Surgery/Aseptic", "q": "Which procedures are typically done in the preparation area rather than the surgery room?", "options": ["Final draping of the sterile field", "Clipping the patient and other 'dirty' procedures like wound debridement", "Closing the surgical incision", "Administering inhalant anesthesia maintenance"], "answer": 1, "explain": "Clipping fur and other dirty procedures (like debriding old wounds or treating abscesses) are performed in the prep area to keep the sterile surgery room free of contamination."}, {"section": "Life Stages/Nutrition", "q": "Which vaccine is considered core for canines in most regions?", "options": ["Bordetella", "Leptospirosis", "Rabies", "Lyme disease"], "answer": 2, "explain": "Rabies, along with DA2PP (distemper, adenovirus, parvovirus, parainfluenza), is considered core for dogs because of disease severity and public health risk. Bordetella, lepto, and Lyme are typically non-core (lifestyle-dependent)."}, {"section": "Nursing/Radiography", "q": "What is the primary purpose of restraining an animal during a veterinary procedure?", "options": ["To punish the animal", "To ensure safety of the patient, staff, and accuracy of the procedure", "To make the procedure take longer", "To replace anesthesia in all cases"], "answer": 1, "explain": "Restraint protects the patient and handlers from injury and helps ensure the procedure (injection, blood draw, exam) can be performed accurately and efficiently."}, {"section": "Nursing/Radiography", "q": "The effectiveness of fluid therapy can be monitored by assessing:", "options": ["Hydration status, urine output, and vital signs", "The color of the fluid bag only", "The patient's coat color", "The time of day"], "answer": 0, "explain": "Effectiveness is judged through clinical parameters like hydration status (skin turgor, mucous membranes), urine output, and normalized vital signs."}, {"section": "Surgery/Aseptic", "q": "Absorbable suture material such as surgical gut (catgut) is broken down in tissue primarily via:", "options": ["Hydrolysis or phagocytosis depending on material type", "Evaporation", "External removal only", "UV light exposure"], "answer": 0, "explain": "Surgical gut is broken down via phagocytosis, while many synthetic absorbable materials break down through hydrolysis; both processes occur naturally within tissue."}, {"section": "Lab Techniques", "q": "A zoonosis is best defined as:", "options": ["A disease that only affects one species", "A disease transmissible from animals to humans", "An infection acquired in a hospital setting", "A disease caused by parasites only"], "answer": 1, "explain": "Zoonosis specifically refers to disease that can pass from animals to humans, regardless of the causative agent (bacteria, virus, parasite, or fungus)."}, {"section": "Nursing/Radiography", "q": "Subcutaneous fluid administration is primarily used to:", "options": ["Provide rapid, large-volume resuscitation in shock", "Provide mild rehydration support for patients who can tolerate slower absorption", "Replace the need for IV fluids in all critical patients", "Deliver anesthesia"], "answer": 1, "explain": "Subcutaneous fluids are absorbed slowly and are appropriate for mild dehydration or supportive care, not for emergencies requiring rapid volume replacement."}, {"section": "Anatomy", "q": "The heart is composed of how many chambers?", "options": ["Two", "Three", "Four", "Six"], "answer": 2, "explain": "The heart has four chambers: the right atrium, right ventricle, left atrium, and left ventricle, organized into two side-by-side pumps."}, {"section": "Life Stages/Nutrition", "q": "Which vaccine is considered core for felines?", "options": ["Feline leukemia virus (FeLV)", "Feline panleukopenia (part of FVRCP)", "Chlamydophila", "Feline immunodeficiency virus (FIV)"], "answer": 1, "explain": "FVRCP (feline viral rhinotracheitis, calicivirus, panleukopenia) along with rabies are core feline vaccines. FeLV, Chlamydophila, and FIV are non-core/lifestyle-based."}, {"section": "Anatomy", "q": "Which of the following are the four basic types of tissue in the body?", "options": ["Epithelial, connective, muscle, and nervous", "Bone, blood, fat, and skin", "Cardiac, smooth, skeletal, and epithelial", "Dermal, epidermal, hypodermal, and vascular"], "answer": 0, "explain": "The four basic tissue types are epithelial, connective, muscle, and nervous tissue, each with distinct structures and functions."}, {"section": "Office Procedures", "q": "Which scenario represents a violation of client/patient confidentiality?", "options": ["Discussing a case with the supervising veterinarian", "Releasing medical records to another vet with the owner's consent", "Posting a client's pet photo and diagnosis on social media without permission", "Documenting findings in the patient's chart"], "answer": 2, "explain": "Sharing identifiable patient or client information publicly without consent is a confidentiality violation and can carry legal consequences."}, {"section": "Surgery/Aseptic", "q": "Which instrument is primarily used to clamp blood vessels and control bleeding during surgery?", "options": ["Scalpel", "Hemostatic forceps (hemostats)", "Needle holder", "Retractor"], "answer": 1, "explain": "Hemostatic forceps, or hemostats, are crushing instruments specifically designed to clamp blood vessels and control hemorrhage during surgery."}, {"section": "Life Stages/Nutrition", "q": "A well-designed animal housing area in a veterinary facility should include:", "options": ["Non-absorbent, easily sanitized surfaces", "Carpeted floors throughout", "No drainage system", "Shared water bowls across all cages with no cleaning"], "answer": 0, "explain": "Housing areas should use sanitary, non-porous materials that can be properly disinfected to minimize disease transmission risk."}, {"section": "Office Procedures", "q": "Which of these best describes a legal responsibility of veterinary staff regarding client records?", "options": ["Records can be shared with anyone who asks", "Records must be retained for a legally defined period of time", "Records may be destroyed immediately after a visit", "Only the veterinarian needs to know what's in the record"], "answer": 1, "explain": "State laws require veterinary medical records be retained for a set number of years; staff are legally responsible for proper retention and handling."}, {"section": "Surgery/Aseptic", "q": "Which of the following is a basic rule of aseptic technique in the operating room?", "options": ["Mix sterile and nonsterile items freely", "Keep sterile items grouped together and separate from nonsterile items", "Increase unnecessary movement around the surgical field", "Assume an item is sterile unless proven otherwise"], "answer": 1, "explain": "A core rule is to keep sterile items together, separate from nonsterile items, restrict unnecessary movement, and when in doubt, consider an item contaminated."}, {"section": "Nursing/Radiography", "q": "Normal rectal temperature in dogs is generally cited as approximately:", "options": ["95-97\u00b0F", "99.5-102\u00b0F", "104-106\u00b0F", "90-95\u00b0F"], "answer": 1, "explain": "Normal canine rectal temperature is typically 99.5-102\u00b0F (37.5-39\u00b0C). Cats run very similarly, around 100-102\u00b0F."}, {"section": "Nursing/Radiography", "q": "The normal respiratory rate range for both dogs and cats at rest is approximately:", "options": ["10-30 breaths/min", "50-70 breaths/min", "1-5 breaths/min", "100-150 breaths/min"], "answer": 0, "explain": "Normal resting respiratory rate for both dogs and cats generally falls in the range of about 10-30 breaths per minute."}, {"section": "Surgery/Aseptic", "q": "Aseptic technique is best defined as:", "options": ["A method to speed up surgery time", "All precautions taken to prevent contamination and infection of a surgical wound", "A way to clean the waiting room", "A type of suture material"], "answer": 1, "explain": "Aseptic technique encompasses all the precautions used before and during surgery to minimize contamination and reduce the risk of postoperative infection."}, {"section": "Anatomy", "q": "The appendicular skeleton refers to the bones of the:", "options": ["Skull", "Limbs (forelimbs and hindlimbs)", "Spine", "Ribs"], "answer": 1, "explain": "The appendicular skeleton is composed of the bones of the limbs \u2014 the thoracic (front) limb and pelvic (hind) limb."}, {"section": "Pharmacology", "q": "Which best differentiates a prescription drug from an over-the-counter (OTC) drug?", "options": ["Prescription drugs can be bought off the shelf; OTC cannot", "Prescription drugs legally require veterinary authorization; OTC do not", "OTC drugs are regulated by the FDA, prescription drugs are not", "There is no real difference"], "answer": 1, "explain": "Prescription drugs require a veterinarian's order due to safety/dosing concerns, while OTC products can be purchased without one. Both categories are FDA-regulated, just differently."}, {"section": "Pharmacology", "q": "Using the same medication (100mg/mL) and the 1,000mg per-dose amount from the previous calculation, how many mL is given per dose?", "options": ["1 mL", "5 mL", "10 mL", "100 mL"], "answer": 2, "explain": "1,000mg \u00f7 100mg/mL = 10 mL per dose."}, {"section": "Lab Techniques", "q": "The saphenous vein used for venipuncture in dogs is located:", "options": ["On the lateral aspect of the rear leg, above the hock", "On the cranial aspect of the front leg", "Inside the ear pinna", "On the ventral abdomen"], "answer": 0, "explain": "The lateral saphenous vein runs across the lateral surface of the lower hind limb and is a common venipuncture site, especially in dogs."}, {"section": "Nursing/Radiography", "q": "Which task is typically within the scope of a veterinary assistant rather than a credentialed veterinary technician?", "options": ["Administering anesthesia", "Interpreting bloodwork", "Feeding and basic restraint of patients", "Performing surgery"], "answer": 2, "explain": "Veterinary assistants commonly handle feeding, basic restraint, exercising, and similar supportive nursing tasks. Anesthesia administration, diagnostic interpretation, and surgery require a credentialed technician or veterinarian."}, {"section": "Career Prep", "q": "If a veterinary assistant is unsure how to perform a task that has been delegated to them, the best course of action is to:", "options": ["Guess and proceed anyway", "Ask the supervising veterinarian or technician for clarification before proceeding", "Skip the task entirely without telling anyone", "Perform a different task instead without communication"], "answer": 1, "explain": "When uncertain, asking for clarification from a supervisor protects patient safety and is a core expectation of professional conduct in veterinary settings."}, {"section": "Career Prep", "q": "On a multiple-choice exam, which test-taking strategy is generally recommended?", "options": ["Always choose the first answer that seems plausible without reading all options", "Read every answer choice before selecting, and eliminate clearly wrong options first", "Skip questions you're unsure about and never return to them", "Change every answer at the last minute regardless of confidence"], "answer": 1, "explain": "Reading all options and using elimination improves accuracy, especially on exams with close or tricky distractor answers."}, {"section": "Pharmacology", "q": "What is the value of 3.8 meters in millimeters?", "options": ["38 mm", "380 mm", "3,800 mm", "38,000 mm"], "answer": 2, "explain": "1 m = 1,000 mm, so 3.8 m \u00d7 1,000 = 3,800 mm."}, {"section": "Life Stages/Nutrition", "q": "Appropriate husbandry to reduce disease and stress in a boarded kennel includes:", "options": ["Crowding multiple unfamiliar animals into one space", "Routine cleaning, proper ventilation, and adequate space per animal", "Eliminating all enrichment", "Avoiding any temperature control"], "answer": 1, "explain": "Good husbandry practices reduce disease transmission and stress through sanitation, adequate space, ventilation, and appropriate environmental enrichment."}, {"section": "Office Procedures", "q": "The scope of practice for a credentialed veterinary technician generally includes which of the following, under supervision?", "options": ["Diagnosing disease independently", "Prescribing medications without oversight", "Performing technical and nursing tasks delegated by the veterinarian", "Performing surgery without a veterinarian present"], "answer": 2, "explain": "Credentialed veterinary technicians perform many nursing and technical duties under the supervision and direction of a licensed veterinarian, but diagnosis, prognosis, and surgery remain restricted to the DVM in most states."}, {"section": "Surgery/Aseptic", "q": "Items that cannot tolerate the heat and pressure of steam sterilization (e.g., some plastics, endoscopes) are commonly sterilized using:", "options": ["Ethylene oxide gas sterilization", "Boiling water only", "Open air exposure", "Freezing"], "answer": 0, "explain": "Ethylene oxide gas sterilization is used for heat-sensitive items that cannot withstand autoclaving, though it requires proper aeration afterward due to its toxicity."}, {"section": "Office Procedures", "q": "What is the appropriate first step when admitting a new patient?", "options": ["Begin treatment immediately", "Obtain a brief history and reason for visit from the owner", "Send the patient straight to surgery", "Skip documentation if the visit is routine"], "answer": 1, "explain": "Admitting a patient starts with gathering a relevant history (signalment, reason for visit, current concerns) before any other administrative or clinical step."}, {"section": "Nursing/Radiography", "q": "Which of the following is part of a comprehensive physical examination?", "options": ["Auscultation of heart and lungs", "Checking the patient's email", "Filing the patient's record only", "Skipping palpation of the abdomen"], "answer": 0, "explain": "Auscultation of heart and lungs is a core part of a physical exam, along with palpation, observation of mucous membranes, body condition scoring, and other system checks."}, {"section": "Surgery/Aseptic", "q": "What is the most common and efficient method of sterilization used in veterinary clinics?", "options": ["UV light exposure", "Pressurized steam (autoclaving)", "Soaking in plain water", "Air drying"], "answer": 1, "explain": "Autoclaving uses pressurized steam to achieve sterilization and is the most common, cost-effective method used for most veterinary surgical instruments."}, {"section": "Life Stages/Nutrition", "q": "Which feline breed is known for being naturally tailless or having a very short tail?", "options": ["Manx", "Siamese", "Persian", "Ragdoll"], "answer": 0, "explain": "The Manx breed is best known for a genetic mutation that results in a short or absent tail."}, {"section": "Life Stages/Nutrition", "q": "Macronutrients required in an animal's diet include all of the following EXCEPT:", "options": ["Protein", "Fat", "Carbohydrates", "Vitamins"], "answer": 3, "explain": "Protein, fat, and carbohydrates are macronutrients needed in larger quantities. Vitamins are micronutrients needed in much smaller amounts."}, {"section": "Office Procedures", "q": "Maintaining accurate medical records primarily serves which purpose?", "options": ["Continuity of patient care and legal documentation", "Decoration for the front desk", "A way to avoid talking to clients", "Only useful for marketing purposes"], "answer": 0, "explain": "Medical records ensure continuity of care between visits and providers, and serve as the legal record of services rendered and findings."}, {"section": "Pharmacology", "q": "Which best defines an adverse drug reaction (ADR)?", "options": ["Any expected, beneficial effect of a drug", "An unintended and harmful response to a medication given at a normal dose", "A reaction that only occurs with overdose", "A reaction that never requires reporting"], "answer": 1, "explain": "An ADR is an unintended, harmful response occurring at normal therapeutic doses, distinct from toxicity from overdose or expected side effects."}, {"section": "Pharmacology", "q": "A medication contains 100mg/mL. The dose rate is 10mg/kg BID for a patient weighing 100kg. What is the TOTAL DAILY dose in mg?", "options": ["1,000 mg", "2,000 mg", "100 mg", "10,000 mg"], "answer": 1, "explain": "Per-dose amount: 10mg/kg \u00d7 100kg = 1,000mg per dose. BID means twice daily, so total daily dose = 1,000mg \u00d7 2 = 2,000mg."}, {"section": "Anatomy", "q": "The two main layers of skin are the:", "options": ["Epidermis and dermis", "Hypodermis and fascia", "Cortex and medulla", "Serosa and mucosa"], "answer": 0, "explain": "Skin consists of the superficial epidermis (epithelial layer) and the deeper dermis (connective tissue layer), with the hypodermis lying beneath both."}, {"section": "Nursing/Radiography", "q": "According to standard reference ranges, the normal resting heart rate range for an adult cat is approximately:", "options": ["40-60 beats/min", "140-250 beats/min", "300-400 beats/min", "10-30 beats/min"], "answer": 1, "explain": "Normal feline heart rate is typically cited as 140-250 beats per minute, notably faster than canine resting heart rate."}, {"section": "Lab Techniques", "q": "Which organism is the causative agent of ringworm in dogs and cats?", "options": ["A bacterium", "A fungus", "A virus", "A protozoan"], "answer": 1, "explain": "Ringworm (dermatophytosis) is caused by fungi, most commonly Microsporum canis. Despite the name, it is not caused by a worm."}, {"section": "Life Stages/Nutrition", "q": "How can a veterinary assistant help prepare a client for pet loss?", "options": ["Avoid discussing the topic entirely", "Provide compassionate communication and information about grief resources", "Rush the client through the process", "Discourage the client from asking questions"], "answer": 1, "explain": "Veterinary assistants can support grieving clients through empathetic communication and by providing resources, such as pet loss support information."}, {"section": "Surgery/Aseptic", "q": "Which of the following best describes monofilament suture material?", "options": ["Made of several braided strands", "Made of a single strand, creating less tissue drag", "Always nonabsorbable", "Cannot be used in surgery"], "answer": 1, "explain": "Monofilament sutures consist of a single strand of material, resulting in less tissue drag than braided multifilament sutures, though they can be less pliable."}, {"section": "Nursing/Radiography", "q": "What is a key responsibility of the person performing restraint during an injection?", "options": ["Distracting the veterinarian", "Maintaining control of the patient's body and the limb/area being used, without restricting breathing", "Holding only the tail", "Leaving the room once restraint begins"], "answer": 1, "explain": "The restrainer must maintain safe, effective control of the relevant body part for the procedure while avoiding excessive restriction that could harm the patient (e.g., compromising breathing)."}, {"section": "Life Stages/Nutrition", "q": "Compared to dogs, the feline estrous cycle is best described as:", "options": ["Identical to canine cycles", "Seasonally polyestrous, with cats often being induced ovulators", "Strictly monestrous (once per year)", "Nonexistent; cats do not cycle"], "answer": 1, "explain": "Cats are typically seasonally polyestrous and are induced ovulators, meaning ovulation is generally triggered by the act of mating rather than occurring spontaneously."}, {"section": "Life Stages/Nutrition", "q": "Which behavior would be considered abnormal in an adult cat and may warrant behavioral or medical workup?", "options": ["Grooming after eating", "Sleeping much of the day", "Sudden, unprovoked aggression with no clear trigger", "Scratching on appropriate surfaces"], "answer": 2, "explain": "Sudden unprovoked aggression is atypical and can indicate pain, illness, or a behavioral disorder requiring veterinary evaluation."}, {"section": "Pharmacology", "q": "On a prescription label, which element identifies how the medication should be given?", "options": ["The directions for use (e.g., 'Give one tablet twice daily')", "The pharmacy's phone number only", "The expiration date only", "The veterinarian's signature"], "answer": 0, "explain": "Directions for use tell the client how, how much, and how often to administer the medication\u2014an essential and required label component."}, {"section": "Nursing/Radiography", "q": "According to standard reference ranges, the normal resting heart rate range for an adult dog is approximately:", "options": ["20-40 beats/min", "60-140 beats/min", "200-300 beats/min", "10-20 beats/min"], "answer": 1, "explain": "Normal canine heart rate is generally cited as 60-140 beats per minute, varying with size (smaller dogs trend higher)."}, {"section": "Career Prep", "q": "Which of the following best demonstrates professionalism in a veterinary workplace?", "options": ["Arriving on time, following the dress code, and communicating respectfully with coworkers", "Frequently missing shifts without notice", "Disregarding the chain of command", "Speaking negatively about coworkers to clients"], "answer": 0, "explain": "Professionalism includes reliability, appropriate appearance and conduct, and respectful communication with both coworkers and clients."}, {"section": "Lab Techniques", "q": "Which of these is NOT typically considered a zoonotic disease?", "options": ["Toxoplasmosis", "Leptospirosis", "Ringworm", "Canine distemper"], "answer": 3, "explain": "Canine distemper affects dogs and related species but does not infect humans. Toxoplasmosis, leptospirosis, and ringworm can all be transmitted to people."}, {"section": "Life Stages/Nutrition", "q": "A key consideration in the euthanasia decision-making process is:", "options": ["Cost alone, regardless of the patient's condition", "Quality of life and prognosis for the patient", "Convenience for the clinic schedule", "Avoiding the topic with the owner"], "answer": 1, "explain": "Euthanasia decisions should center on the animal's quality of life, prognosis, and suffering, discussed openly and compassionately with the owner."}, {"section": "Career Prep", "q": "When studying for a multiple-choice exam, which strategy is generally most effective?", "options": ["Cramming all material the night before only", "Active recall and spaced repetition over multiple study sessions", "Reading material once and never reviewing it again", "Skipping practice questions entirely"], "answer": 1, "explain": "Active recall (testing yourself) combined with spaced repetition (reviewing material over multiple sessions) is well-supported as more effective than passive rereading or last-minute cramming."}, {"section": "Lab Techniques", "q": "When restraining a dog for jugular venipuncture, the patient is typically positioned:", "options": ["In lateral recumbency with the neck extended", "Sitting upright with the head pulled down", "In dorsal recumbency with the head extended and chin up", "Standing with the head turned to the side"], "answer": 2, "explain": "Jugular draws are usually performed with the patient in dorsal or sitting position, head and neck extended upward, so the vein is visualized along the jugular furrow."}, {"section": "Lab Techniques", "q": "Specific gravity of urine is measured using which instrument?", "options": ["A hemocytometer", "A refractometer", "A centrifuge", "A microscope"], "answer": 1, "explain": "A refractometer measures urine specific gravity by assessing how light bends through the sample, indicating concentration of dissolved solutes."}, {"section": "Lab Techniques", "q": "Which urinalysis component is assessed using a chemical reagent strip (dipstick)?", "options": ["Specific gravity only", "Color and clarity only", "pH, protein, glucose, ketones, and blood", "Sediment cell counts"], "answer": 2, "explain": "Reagent strips provide rapid chemical analysis for items like pH, protein, glucose, ketones, bilirubin, and occult blood. Specific gravity requires a refractometer, and sediment exam requires microscopy."}, {"section": "Pharmacology", "q": "A possible consequence of an adverse drug reaction includes:", "options": ["Improved patient outcome with no risk", "Organ damage, allergic reaction, or in severe cases death", "Guaranteed cure of the underlying disease", "No clinical significance ever"], "answer": 1, "explain": "ADRs can range from mild (rash, GI upset) to severe (organ damage, anaphylaxis, death), which is why monitoring and reporting are important."}, {"section": "Lab Techniques", "q": "Which of the following is considered a zoonotic disease?", "options": ["Parvovirus", "Rabies", "Heartworm disease", "Feline leukemia"], "answer": 1, "explain": "Rabies is transmissible from animals to humans, making it a classic zoonosis. Parvo, heartworm, and FeLV are not transmissible to people."}, {"section": "Life Stages/Nutrition", "q": "According to AVMA Responsible Pet Ownership guidelines, which of the following is a core recommendation?", "options": ["Provide regular veterinary care including vaccinations", "Allow pets to roam freely without supervision", "Feed only table scraps", "Skip routine wellness exams once adult"], "answer": 0, "explain": "Responsible ownership guidelines emphasize routine veterinary care, proper identification, nutrition, and humane treatment."}, {"section": "Surgery/Aseptic", "q": "Postoperative monitoring of a surgical patient should include checking:", "options": ["Body temperature, attitude, appetite, and the surgical incision", "Only the cage card", "The owner's contact information repeatedly", "Nothing until discharge"], "answer": 0, "explain": "Postoperative evaluation includes body temperature, weight, attitude, appetite/thirst, urination/defecation, and appearance of the surgical wound to catch complications early."}, {"section": "Nursing/Radiography", "q": "The subcutaneous injection site in dogs and cats is typically:", "options": ["Directly into a vein", "The loose skin over the dorsal neck/scapular region", "Inside the ear canal", "Between the toes"], "answer": 1, "explain": "The loose skin over the back of the neck and shoulders (scruff area) is the standard site for subcutaneous injections due to easy tenting of the skin."}, {"section": "Surgery/Aseptic", "q": "Disinfection differs from sterilization in that disinfection:", "options": ["Destroys all microorganisms including spores", "Destroys most pathogenic microorganisms on inanimate objects, but not necessarily spores", "Is only used on living tissue", "Is identical to antisepsis"], "answer": 1, "explain": "Disinfection targets most pathogenic microorganisms on nonliving surfaces but does not guarantee destruction of bacterial spores, unlike sterilization."}, {"section": "Lab Techniques", "q": "For cephalic venipuncture in a small animal patient, the restrainer's main role is to:", "options": ["Apply a tourniquet above the elbow only", "Extend the leg and occlude the vein by applying pressure above the venipuncture site", "Hold the patient's mouth closed", "Apply pressure below the venipuncture site"], "answer": 1, "explain": "The restrainer extends the front leg and applies digital pressure proximal to (above) the draw site to distend the cephalic vein for visualization and access."}, {"section": "Pharmacology", "q": "Which statement about parasiticides is generally true?", "options": ["All parasiticides are safe for all species at any dose", "Some parasiticides (e.g., certain permethrin products) are dangerous or even fatal in cats", "Parasiticides have no contraindications", "Parasiticides cannot cause toxicity"], "answer": 1, "explain": "Permethrin-based products, safe in dogs, can be highly toxic and even fatal in cats, illustrating why species-specific dosing and product selection matters."}, {"section": "Lab Techniques", "q": "Why is accurate documentation of lab results in the medical record important?", "options": ["It is only needed for billing purposes", "It supports continuity of care and legal protection for the practice", "It is optional unless results are abnormal", "It only matters for surgical patients"], "answer": 1, "explain": "Accurate, timely documentation supports patient care decisions over time and serves as a legal record of what was done and found."}, {"section": "Office Procedures", "q": "Which document typically requires a veterinarian's (not assistant's) signature?", "options": ["Appointment reminder card", "Health certificate for travel", "Reception sign-in sheet", "Inventory restock order"], "answer": 1, "explain": "Health certificates, controlled substance logs, and similar legal documents require a licensed veterinarian's signature, not an assistant's."}, {"section": "Nursing/Radiography", "q": "A basket muzzle is generally preferred over a fabric muzzle for dogs because it:", "options": ["Prevents panting and drinking entirely", "Allows the dog to pant, drink, and breathe more easily while still preventing biting", "Is cheaper", "Cannot be used on aggressive dogs"], "answer": 1, "explain": "Basket muzzles allow normal panting and even some drinking, making them safer for longer-term use, while still preventing the dog from biting."}, {"section": "Career Prep", "q": "Which file-handling practice best protects patient data confidentiality in a digital record system?", "options": ["Sharing login credentials with all staff freely", "Logging out or locking your workstation when stepping away from patient records", "Leaving patient records open on an unattended screen", "Printing all records and leaving them on the front desk"], "answer": 1, "explain": "Locking or logging out of a workstation when away protects sensitive patient and client information from unauthorized viewing, supporting confidentiality requirements."}, {"section": "Office Procedures", "q": "Which of the following is an ethical responsibility in veterinary practice?", "options": ["Maintaining client confidentiality", "Charging the highest possible price", "Avoiding all communication with clients", "Refusing care to ensure profit"], "answer": 0, "explain": "Maintaining confidentiality of client and patient information is a core ethical responsibility for anyone working in a veterinary practice."}, {"section": "Career Prep", "q": "Which of the following is considered an essential 'soft skill' for veterinary assistants when communicating with grieving or upset clients?", "options": ["Empathy and active listening", "Speaking as fast as possible", "Avoiding eye contact", "Interrupting to move to the next client"], "answer": 0, "explain": "Empathy and active listening help build trust with clients, especially during stressful or emotional situations like discussing a pet's illness or loss."}, {"section": "Surgery/Aseptic", "q": "What is the minimum effective autoclave temperature commonly cited for achieving sterilization?", "options": ["100\u00b0C (212\u00b0F)", "121\u00b0C (250\u00b0F)", "50\u00b0C (122\u00b0F)", "200\u00b0C (392\u00b0F)"], "answer": 1, "explain": "Most autoclaves achieve sterilization at approximately 121\u00b0C (250\u00b0F) under at least 15 psi of pressure, typically for 9-15 minutes of exposure."}, {"section": "Surgery/Aseptic", "q": "Chemical sterilization indicators (such as indicator tape) primarily verify:", "options": ["That sterility has been guaranteed", "That a certain temperature or chemical exposure threshold was reached during the cycle", "The exact bacterial count remaining", "Nothing useful"], "answer": 1, "explain": "Indicators change color when specific temperature/chemical/time conditions are met, but they do not guarantee true sterility \u2014 biologic testing is used for that verification."}, {"section": "Pharmacology", "q": "10 kilograms equals how many grams?", "options": ["100 g", "1,000 g", "10,000 g", "100,000 g"], "answer": 2, "explain": "1 kg = 1,000 g, so 10 kg \u00d7 1,000 = 10,000 g."}, {"section": "Career Prep", "q": "Which of these is a basic computer skill commonly expected in a veterinary office setting?", "options": ["Entering and retrieving patient records in practice management software", "Writing custom software code", "Repairing the office printer's internal hardware", "Building a website"], "answer": 0, "explain": "Veterinary assistants are expected to handle day-to-day software use like data entry and retrieval in practice management systems, not advanced technical work."}, {"section": "Life Stages/Nutrition", "q": "Non-core vaccines are generally administered based on:", "options": ["The animal's age only", "The animal's lifestyle and regional disease risk", "Random scheduling", "Owner's vaccine preference with no clinical input"], "answer": 1, "explain": "Non-core vaccines (e.g., Bordetella, Lyme, FeLV) are recommended based on an individual animal's exposure risk, geography, and lifestyle factors."}, {"section": "Life Stages/Nutrition", "q": "Which of these is an example of normal behavioral development in a puppy?", "options": ["Extreme fear of all new stimuli at 8 weeks with no improvement over time", "Progressive socialization and curiosity during the socialization period (roughly 3-14 weeks)", "Complete avoidance of littermates", "Aggression toward all humans from birth"], "answer": 1, "explain": "The canine socialization period is a critical window where puppies normally show increasing curiosity and adaptability to new people, animals, and environments."}, {"section": "Surgery/Aseptic", "q": "Sterilization is defined as:", "options": ["The destruction of most, but not all, pathogenic organisms", "The destruction of all microorganisms including spores", "Cleaning visible debris only", "Reducing odor on instruments"], "answer": 1, "explain": "Sterilization destroys all microorganisms, including bacterial spores, which is a more complete process than disinfection."}, {"section": "Pharmacology", "q": "A medication contains 50mg/tab. Dose is 10mg/kg TID for a 45-pound dog, for 5 days. How many tablets should be dispensed? (Round to the nearest whole number.)", "options": ["About 31 tablets", "About 41 tablets", "About 51 tablets", "About 61 tablets"], "answer": 3, "explain": "Convert weight: 45 lb \u00f7 2.2 = 20.45 kg. Dose per administration: 10mg/kg \u00d7 20.45kg = 204.5mg. Tablets per dose: 204.5mg \u00f7 50mg/tab = 4.09 tabs. Total doses over treatment: TID (3x/day) \u00d7 5 days = 15 doses. Total tablets: 4.09 \u00d7 15 = 61.4, which rounds to 61 tablets."}, {"section": "Career Prep", "q": "Which of the following best supports effective time management during a busy clinic shift?", "options": ["Prioritizing tasks based on urgency and patient needs", "Doing tasks in random order", "Ignoring deadlines", "Multitasking on unrelated personal activities during patient care"], "answer": 0, "explain": "Effective time management in a clinical setting involves prioritizing based on patient urgency and workflow needs, which keeps both care quality and efficiency high."}, {"section": "Pharmacology", "q": "What is the value of 5 liters in milliliters?", "options": ["50 mL", "500 mL", "5,000 mL", "50,000 mL"], "answer": 2, "explain": "Multiply liters by 1000 to get mL: 5 L \u00d7 1000 = 5,000 mL."}, {"section": "Surgery/Aseptic", "q": "Sterility refers to:", "options": ["The complete absence of all living microorganisms on an item", "Reducing only some bacteria", "A surface that looks clean", "Reducing odor"], "answer": 0, "explain": "Sterility means the total destruction or absence of all microorganisms, including spores, on a surface or object \u2014 a higher standard than disinfection."}, {"section": "Pharmacology", "q": "Convert 480 cc into liters.", "options": ["0.048 L", "0.48 L", "4.8 L", "48 L"], "answer": 1, "explain": "1 cc = 1 mL, and 1000 mL = 1 L, so 480 cc = 480 mL = 0.48 L."}];
const FLASHCARDS = [{"term": "anaphylaxis", "def": "A severe hypersensitivity reaction characterized by profound hypotension, pulmonary edema, and collapse caused by massive exposure to an antigen."}, {"term": "proprietary name (trade name)", "def": "A unique name given by a manufacturer to its particular brand of drug."}, {"term": "nonproprietary name (generic name)", "def": "A concise name given to a specific compound."}, {"term": "venipuncture", "def": "Puncture of a vein for the purpose of withdrawing blood."}, {"term": "leukopenia", "def": "A decreased number of leukocytes in the blood."}, {"term": "contamination", "def": "The presence of microorganisms within or on an object or wound."}, {"term": "isosthenuria", "def": "A condition in which the urine specific gravity approaches that of the glomerular filtrate."}, {"term": "angiotribe", "def": "Large crushing instrument used to clamp blood vessels."}, {"term": "therapeutic range", "def": "The ideal range of a drug concentration in the body."}, {"term": "husbandry", "def": "The production, housing, and management of animals."}, {"term": "fecal flotation (concept)", "def": "Diagnostic lab method that uses a solution of specific gravity to float parasite eggs/oocysts to the surface for identification."}, {"term": "prepatent period", "def": "The time interval between infection with a parasite and demonstration of the infection."}, {"term": "Olsen-Hegar needle holder", "def": "Needle holder with a ratchet lock just distal to the thumb."}, {"term": "muzzle", "def": "Nylon, leather, or gauze covering placed over an animal's mouth to prevent biting."}, {"term": "cotton suture", "def": "An organic nonabsorbable suture material with less tissue reaction than silk; supports bacterial growth."}, {"term": "socialization", "def": "Exposure of a young animal to new experiences, people, animals, and places to prevent fearful or anxious behavior as an adult."}, {"term": "nosocomial infection", "def": "A hospital-acquired infection."}, {"term": "orally administered (per os)", "def": "Given by mouth."}, {"term": "hemoglobinuria", "def": "The presence of free hemoglobin in the urine."}, {"term": "general anesthesia", "def": "A purposeful derangement of a patient's normal physiologic processes to produce unconsciousness, relaxation, analgesia, and/or amnesia."}, {"term": "analgesia", "def": "Pain relief; the inability to feel pain while still conscious."}, {"term": "ketonuria", "def": "The presence of detectable ketone bodies in urine."}, {"term": "anuria", "def": "Absence of urine."}, {"term": "Mayo scissors", "def": "Tissue scissors designed for cutting heavy tissue, such as fascia."}, {"term": "antisepsis", "def": "The destruction of most living pathogenic microorganisms on animate (living) objects."}, {"term": "asepsis", "def": "A condition of being free from infection."}, {"term": "struvite", "def": "A common crystal seen in alkaline to slightly acidic urine; also called a triple phosphate crystal."}, {"term": "neutrophilia", "def": "An abnormal increase in the number of neutrophils in a peripheral blood sample."}, {"term": "Metzenbaum scissors", "def": "Delicate scissors designed for cutting fine, thin tissue."}, {"term": "restraint pole (catchpole)", "def": "Rigid pole with a loop at one end used to move an aggressive or fearful dog to or from a run or cage."}, {"term": "straight (Keith) needle", "def": "A suture needle used in accessible places where the needle can be manipulated directly with the fingers."}, {"term": "hematuria", "def": "The presence of intact erythrocytes in the urine."}, {"term": "absorption", "def": "The movement of drug molecules from the site of administration into the systemic circulation."}, {"term": "Penrose drain", "def": "A surgical device placed in a wound to drain fluid; a soft rubber tube placed in a wound area."}, {"term": "proteinuria", "def": "An abnormal presence of protein in the urine."}, {"term": "parenterally administered", "def": "Given by injection."}, {"term": "controlled substance", "def": "A drug deemed by the DEA as having potential for abuse; also called a schedule drug."}, {"term": "bradycardia", "def": "Abnormally low/decreased heart rate."}, {"term": "dorsal recumbency", "def": "Restraint technique in which the animal is held resting on its back; may require a V trough."}, {"term": "regional (segmental) anesthesia", "def": "Achieved by blocking the nerve(s) that supply a region of the body by injecting anesthetic around the nerves to block conduction."}, {"term": "platelet (thrombocyte)", "def": "Irregular, disk-shaped fragment of megakaryocytes in the blood that assists in blood clotting."}, {"term": "sterilization", "def": "The destruction of all organisms, including bacteria and spores."}, {"term": "nonrebreathing system", "def": "Anesthetic breathing circuit in which exhaled gases are discharged to the environment and do not pass back to the patient."}, {"term": "adduction", "def": "Movement of a limb or part toward the median line or middle of the body."}, {"term": "periosteal elevator", "def": "An instrument designed to remove the periosteum."}, {"term": "dosage interval", "def": "The time between administration of separate drug doses."}, {"term": "apnea", "def": "Suspension of external breathing."}, {"term": "sedation", "def": "A mild to profound degree of CNS depression in which the patient is drowsy but may be aroused by painful stimuli."}, {"term": "agglutination", "def": "Clumping of particles."}, {"term": "euthanasia", "def": "The act of ending a patient's life in a humane manner."}, {"term": "electrocautery", "def": "Use of a device with a heated needle tip or scalpel applied to tissue to provide hemostasis in vessels smaller than 2 mm."}, {"term": "curette", "def": "An instrument used to scrape the surface of dense tissue."}, {"term": "ectoparasite", "def": "A parasite that resides on the surface of its host."}, {"term": "laryngoscope", "def": "A medical instrument used to obtain a view of the vocal folds and glottis; often used to help place the endotracheal tube."}, {"term": "topical anesthesia", "def": "Numbing of an area by reversible block of nerve conduction near the site of administration, producing temporary loss of sensation in a limited area."}, {"term": "scavenging system", "def": "Component of an anesthetic machine that functions to discard excess gas properly."}, {"term": "zoonotic", "def": "Capable of being transmitted between animals and humans."}, {"term": "hemostasis", "def": "The arrest of bleeding by vasoconstriction and coagulation."}, {"term": "pulse oximeter", "def": "A device that detects changes in oxygen saturation of hemoglobin by comparing oxygenated vs. deoxygenated blood; also determines heart rate."}, {"term": "autoclave", "def": "A sterilization unit that creates high-temperature pressurized steam."}, {"term": "tachycardia", "def": "Abnormally rapid beating of the heart."}, {"term": "disinfection", "def": "The destruction of vegetative forms of bacteria on inanimate or nonliving objects; may not necessarily include spores."}, {"term": "anamnesis", "def": "Information gained from the pet owner and others regarding the patient's medical history."}, {"term": "bandage scissors", "def": "Scissors with a blunt tip that can safely be introduced under a bandage for removal."}, {"term": "Weitlaner retractor", "def": "A self-retaining retractor with a box lock to maintain tension on tissues, commonly used in neurologic surgery."}, {"term": "veterinary technician", "def": "A person who has graduated from a 2-year AVMA-accredited program."}, {"term": "dehiscence (implied surgical complication)", "def": "A postoperative complication category referenced alongside hemorrhage, seroma/hematoma, and infection in surgical monitoring."}, {"term": "total daily dose", "def": "The amount of drug delivered to the animal in 24 hours."}, {"term": "veterinary technologist", "def": "A person who has graduated from a 4-year AVMA-accredited program."}, {"term": "curved needle", "def": "Suture needle manipulated with a needle holder."}, {"term": "problem-oriented medical record (POMR)", "def": "A record system where each entry follows a distinct format: database, problem list, plan, and progress (SOAP)."}, {"term": "human-animal bond", "def": "The special interactive bond between humans and animals that enhances human quality of life."}, {"term": "anesthesia", "def": "Loss of feeling or awareness; may be local, regional, spinal-epidural, or general."}, {"term": "capnometer", "def": "A device that determines respiratory rate and end-tidal CO2 by estimating partial CO2 in the bloodstream at the end of expiration."}, {"term": "dose", "def": "The amount of drug administered at one time."}, {"term": "American Veterinary Medical Association (AVMA)", "def": "Organization whose accreditation manual outlines standards for the education of veterinary technicians."}, {"term": "hyaline cast", "def": "A structure formed from the protein precipitate of degenerating kidney tubule cells with no embedded materials."}, {"term": "drug metabolism (biotransformation)", "def": "The alteration of a drug by the body before it is eliminated."}, {"term": "rebreathing system", "def": "Anesthetic breathing circuit in which exhaled gas is recirculated to the patient with CO2 removed."}, {"term": "evisceration", "def": "The protrusion of an organ (viscera) through an incision."}, {"term": "trephine", "def": "An instrument designed to bore holes in bone."}, {"term": "vaporizer", "def": "A component of the anesthetic machine that produces a controlled and predictable concentration of anesthetic vapor in the carrier gas."}, {"term": "electrocoagulation", "def": "Generating heat in tissue with a high-frequency current to provide hemostasis in vessels smaller than 2 mm."}, {"term": "subcutaneous (SQ or SC) injection", "def": "Injecting a drug deep to (beneath) the skin, into the subcutis."}, {"term": "monofilament suture", "def": "A suture made of a single strand of material, creating less tissue drag than multifilament suture."}, {"term": "chief complaint (presenting complaint)", "def": "The reason why the client has sought veterinary care; the primary medical problem."}, {"term": "hypercapnia", "def": "Excess of carbon dioxide in the blood, resulting in respiratory acidosis."}, {"term": "dyspnea", "def": "Increased respiratory effort or difficulty breathing."}, {"term": "intramuscular (IM) injection", "def": "Injecting a drug into a muscle mass."}, {"term": "intradermal (ID) injection", "def": "Injecting a drug within (not beneath) the skin with a very small needle."}, {"term": "Castroviejo needle holder", "def": "Needle holder with a spring and latch mechanism for locking."}, {"term": "anemia", "def": "Reduction in the oxygen-carrying capacity of blood caused by reduced red blood cells, reduced PCV, or reduced hemoglobin concentration."}, {"term": "abduction", "def": "Movement of a limb or part away from the median line or middle of the body."}, {"term": "narcosis", "def": "Unconsciousness induced by a narcotic drug."}, {"term": "sternal recumbency", "def": "A restraint technique in which the animal is held resting on its breastbone (sternum)."}, {"term": "Brown-Adson tissue forceps", "def": "Tissue forceps with small serrations on the tips that cause minimal trauma but hold tissue securely."}, {"term": "intraperitoneal (IP) injection", "def": "Injecting a drug into the abdominal cavity."}, {"term": "agonist", "def": "A chemical substance that can combine with a cell receptor and cause a reaction or create an active site."}, {"term": "eyed needles", "def": "Suture needles in which suture material must be threaded."}, {"term": "tidal volume", "def": "The lung volume representing the normal volume of air displaced between normal inspiration and expiration."}, {"term": "packed cell volume", "def": "Ratio of red blood cells to total plasma volume."}, {"term": "SOAP medical record", "def": "An acronym (Subjective, Objective, Assessment, Plan) identifying the most common data entry format in veterinary practice."}, {"term": "Mayo-Hegar needle holder", "def": "Needle holder with a ratchet lock just distal to the thumb, with a blade for cutting sutures."}, {"term": "refractometer", "def": "Instrument used to measure the refractive index of a solution (used to determine urine specific gravity)."}, {"term": "Controlled Substances Act (CSA) of 1970", "def": "A law most applicable to the veterinary community regarding the drugs used by veterinarians."}, {"term": "cutting needle", "def": "Suture needle with two or three opposing cutting edges, used in tissues that are difficult to penetrate."}, {"term": "credentialed veterinary technician", "def": "A person who has graduated from an AVMA-accredited program, passed the VTNE, and maintains certification, registration, or licensure in their state."}, {"term": "second-intention healing", "def": "Closure of a wound using granulation tissue."}, {"term": "analgesic", "def": "A drug that reduces the perception of pain without loss of other sensations."}, {"term": "tapered needle", "def": "A suture needle with a sharp tip that pierces and spreads tissues without cutting them."}, {"term": "aggression", "def": "Behavior that is intended to harm another individual."}, {"term": "absolute leukocyte value", "def": "The number of each type of leukocyte in peripheral blood; calculated by multiplying the relative percentage by the total WBC count."}, {"term": "leukocytosis", "def": "Increased numbers of leukocytes in the blood."}, {"term": "rongeurs", "def": "An instrument designed to cut and remove bone pieces."}, {"term": "Finochietto retractor", "def": "A self-retaining retractor with a set screw to maintain tension on tissues; commonly used to retract the thoracic wall."}, {"term": "ethylene oxide", "def": "A carcinogenic gas used to sterilize substances that would be damaged by high-temperature techniques; kills bacteria, endospores, mold, and fungi."}, {"term": "distribution", "def": "Movement of a drug from the systemic circulation into the tissues."}, {"term": "Gelpi retractor", "def": "A self-retaining retractor with a box lock to maintain tension on tissues, commonly used in orthopedic surgeries."}, {"term": "specific gravity", "def": "Ratio of the density of a substance to the density of a reference substance; in practice, density of liquid compared to distilled water."}, {"term": "differential cell count", "def": "Procedure for classifying cells to determine the relative percentages of each cell type present in a blood or bone marrow sample."}, {"term": "oliguria", "def": "Decreased urine production."}, {"term": "chemical sterilization indicators", "def": "Paper strips or tape that change color when a certain temperature, pressure, or chemical exposure has been reached, indicating conditions for sterility have been met."}, {"term": "intravenous (IV) injection", "def": "Injecting a drug into a vein."}, {"term": "cyanosis", "def": "A blue coloration of the skin and mucous membranes caused by the presence of deoxygenated hemoglobin."}, {"term": "zoonosis", "def": "Any disease or infection that is naturally transmissible between vertebrate animals and humans."}, {"term": "d\u00e9bridement", "def": "Removal of devitalized or necrotic tissue from a wound to scavenge debris and kill bacteria."}, {"term": "swaged needle", "def": "Suture needle that is joined with suture into a continuous unit."}, {"term": "reservoir bag", "def": "A rebreathing bag that provides a gas volume sufficient for the patient to inhale maximally without creating negative pressure in the circuit."}, {"term": "Balfour retractor", "def": "Self-retaining retractor with a set screw to maintain tension on tissues; commonly used to retract the abdominal wall."}, {"term": "polyuria", "def": "An increase in the total volume of urine produced."}, {"term": "tenotomy scissors", "def": "Delicate scissors designed for ophthalmic procedures."}, {"term": "informed consent", "def": "A person's agreement to allow a medical treatment or procedure based on full disclosure of facts necessary to make an intelligent decision."}, {"term": "antagonist", "def": "A drug or chemical substance that opposes or blocks the action of another substance, often by combining with and blocking a receptor."}, {"term": "third-intention healing", "def": "Treatment of a grossly contaminated wound by delaying surgical closure until contamination has been markedly reduced."}, {"term": "veterinary assistant", "def": "A person with the training of a clinical aide, less than that required of a veterinary technician."}, {"term": "veterinarian", "def": "A person who has graduated from a 4-year AVMA-accredited program and received a Doctor of Veterinary Medicine (DVM) degree."}, {"term": "polycythemia", "def": "An increase in the number of circulating erythrocytes."}, {"term": "Rochester-Carmalt forceps", "def": "A large crushing instrument often used to control large tissue bundles."}, {"term": "Senn (rake) retractor", "def": "Double-ended retractor, one end with fingerlike curved prongs and the other end with a flat curved blade."}, {"term": "disinfectants", "def": "Chemical agents that kill or prevent the growth of microorganisms on inanimate objects."}, {"term": "pollakiuria", "def": "Increase in the frequency of urination."}, {"term": "malpractice", "def": "A type of negligence in which a practitioner fails to follow generally accepted professional standards, causing injury to the patient."}, {"term": "flowmeter", "def": "Part of the anesthetic machine that measures and delivers a constant gas flow to the vaporizer, common gas outlet, and breathing circuit."}, {"term": "body condition scoring", "def": "Method of subjectively quantifying subcutaneous body fat reserves."}, {"term": "Crile forceps", "def": "Hemostatic forceps with transverse serrations that extend the entire jaw length."}, {"term": "first-intention (primary) healing", "def": "The healing of injured tissue directly without intervention of granulation tissue."}, {"term": "closed-suction drain", "def": "Drain that uses vacuum bottles and plastic conduits to draw fluid away from the wound by producing negative pressure."}, {"term": "dosage form", "def": "The form in which a drug is supplied \u2014 solid, semisolid, or liquid."}, {"term": "thrombocytopenia", "def": "Decrease in circulating platelets."}, {"term": "buffy coat", "def": "A layer of material above packed erythrocytes following centrifugation; consists primarily of leukocytes and thrombocytes."}, {"term": "definitive host", "def": "The host that harbors the adult, mature, or sexual stages of a parasite."}, {"term": "topical application", "def": "Applied onto the skin."}, {"term": "plain surgical gut", "def": "A suture material made from the submucosa of sheep intestines or serosa of bovine intestines."}, {"term": "silk suture", "def": "Braided, multifilament, organic, nonabsorbable suture material."}, {"term": "esophageal stethoscope", "def": "An instrument placed in the esophagus at the level of the heart during anesthesia to amplify and monitor the heartbeat."}, {"term": "osteotome", "def": "An instrument designed to cut or shape bone and cartilage."}, {"term": "Kelly forceps", "def": "Hemostatic forceps with transverse serrations that extend over only the distal portion of the jaws."}, {"term": "intermediate host", "def": "The host that harbors the larval, immature, or asexual stages of a parasite."}, {"term": "excretion", "def": "The removal of a drug from the body."}, {"term": "hemolysis", "def": "The rupture of a red blood cell; destruction of erythrocytes."}, {"term": "lateral recumbency", "def": "A restraint technique in which the animal is held resting on the side of the body."}, {"term": "hypoxemia", "def": "Deficiency in the amount of oxygen reaching body tissues."}, {"term": "neutropenia", "def": "Abnormal decrease in the number of neutrophils in a peripheral blood sample."}, {"term": "multifilament suture", "def": "A suture made of several strands of material twisted or braided together; more pliable and flexible than monofilament."}, {"term": "endoparasite", "def": "A parasite that resides within a host's tissues."}, {"term": "Mayo stand", "def": "An instrument stand that is movable and has a removable tray top."}, {"term": "prescription", "def": "An order from a licensed veterinarian directing a pharmacist to prepare a drug for use in a client's animal."}, {"term": "mosquito hemostat", "def": "A small hemostatic forceps with transverse jaw serrations."}, {"term": "Mathieu needle holder", "def": "Needle holder with a ratchet lock at the proximal end of the handles, permitting locking and unlocking with a progressive squeeze."}, {"term": "subtherapeutic level", "def": "A dose that leaves a drug below the ideal range of concentration, so the beneficial effect is not achieved."}, {"term": "granulation tissue", "def": "Highly vascularized connective tissue produced after extensive tissue damage."}, {"term": "American Animal Hospital Association (AAHA)", "def": "An organization that has set standards for veterinary practice facilities."}, {"term": "aseptic technique", "def": "All precautions taken to prevent contamination and ultimately infection."}, {"term": "chromic surgical gut", "def": "Surgical gut suture exposed to chrome or aldehyde to slow absorption."}, {"term": "tachypnea", "def": "Rapid breathing."}, {"term": "negligence", "def": "A finding that a practitioner's actions were below the level of competence expected of the professional."}, {"term": "adverse drug reaction", "def": "An unintended and harmful response to a medication given at a normal dose (related concept, paired with the glossary's pharmacology terms)."}, {"term": "suture scissors", "def": "Scissors with a concavity at the top of one blade, designed for removing skin sutures after wound healing."}, {"term": "antiseptic", "def": "Chemical agent that kills or prevents the growth of microorganisms on living tissue."}];

function shuffleArr(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

const nav = { mode: 'home' };

function goHome() {
  nav.mode = 'home';
  renderApp();
}

function renderApp() {
  const root = document.getElementById('app-root');
  if (nav.mode === 'home') {
    renderHome(root);
  } else if (nav.mode === 'flashcards') {
    renderFlashcards(root);
  } else if (nav.mode === 'quiz') {
    renderQuiz(root);
  }
}

function renderHome(root) {
  root.innerHTML =
    '<button class="mode-btn" onclick="window.__startFlashcards()">' +
      '<p class="title">Flashcards</p>' +
      '<p class="sub">' + FLASHCARDS.length + ' terms &middot; flip to reveal the definition</p>' +
    '</button>' +
    '<button class="mode-btn" onclick="window.__startQuiz(10)">' +
      '<p class="title">Quick 10</p>' +
      '<p class="sub">A fast 10-question pull from the full question bank</p>' +
    '</button>' +
    '<button class="mode-btn" onclick="window.__startQuiz(100)">' +
      '<p class="title">Full 100</p>' +
      '<p class="sub">The complete practice exam &middot; 77% needed to pass</p>' +
    '</button>';
}

const flashState = { idx: 0, deck: [], flipped: false, known: 0, learning: 0 };

window.__startFlashcards = function() {
  flashState.idx = 0;
  flashState.deck = shuffleArr(FLASHCARDS);
  flashState.flipped = false;
  flashState.known = 0;
  flashState.learning = 0;
  nav.mode = 'flashcards';
  renderApp();
};

function renderFlashcards(root) {
  const total = flashState.deck.length;
  if (flashState.idx >= total) {
    root.innerHTML =
      '<button class="back-link" onclick="window.__goHome()">&larr; Back to study modes</button>' +
      '<div style="text-align:center;padding:1.5rem 0;">' +
        '<p style="font-size:16px;font-weight:600;margin:0 0 8px;">Deck complete</p>' +
        '<p style="font-size:14px;color:#666;margin:0 0 20px;">Got it: ' + flashState.known + ' &middot; Still learning: ' + flashState.learning + '</p>' +
        '<button onclick="window.__startFlashcards()" style="width:100%;padding:13px;border-radius:10px;background:#2f6fed;color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;">Shuffle and restart deck</button>' +
      '</div>';
    return;
  }
  const card = flashState.deck[flashState.idx];
  const progress = Math.round((flashState.idx / total) * 100);

  let cardInner = '';
  if (!flashState.flipped) {
    cardInner =
      '<p style="font-size:12px;color:#999;margin:0 0 10px;text-transform:uppercase;letter-spacing:0.04em;">Term</p>' +
      '<p style="font-size:22px;font-weight:600;margin:0;line-height:1.4;">' + card.term + '</p>' +
      '<p style="font-size:13px;color:#999;margin:20px 0 0;">Tap to reveal definition</p>';
  } else {
    cardInner =
      '<p style="font-size:12px;color:#999;margin:0 0 10px;text-transform:uppercase;letter-spacing:0.04em;">Definition</p>' +
      '<p style="font-size:17px;margin:0;line-height:1.6;color:#1a1a1a;">' + card.def + '</p>';
  }

  root.innerHTML =
    '<button class="back-link" onclick="window.__goHome()">&larr; Back to study modes</button>' +
    '<div style="margin-bottom:16px;">' +
      '<div style="display:flex;justify-content:space-between;font-size:12px;color:#999;margin-bottom:6px;">' +
        '<span>Card ' + (flashState.idx + 1) + ' of ' + total + '</span>' +
        '<span>Got it: ' + flashState.known + ' &middot; Learning: ' + flashState.learning + '</span>' +
      '</div>' +
      '<div style="height:5px;background:#ece9e2;border-radius:4px;overflow:hidden;">' +
        '<div style="height:100%;width:' + progress + '%;background:#2f6fed;"></div>' +
      '</div>' +
    '</div>' +
    '<div onclick="window.__flipCard()" style="min-height:160px;display:flex;flex-direction:column;justify-content:center;padding:24px 18px;border-radius:12px;background:#fafaf7;border:1px solid #e4e1d8;cursor:pointer;-webkit-tap-highlight-color:transparent;">' +
      cardInner +
    '</div>' +
    (flashState.flipped ?
      '<div style="display:flex;gap:10px;margin-top:14px;">' +
        '<button onclick="window.__cardAnswer(false)" style="flex:1;padding:13px;border-radius:10px;background:#fbecec;border:1px solid #f0d6d6;color:#9c2f2f;font-size:14px;font-weight:600;cursor:pointer;">Still learning</button>' +
        '<button onclick="window.__cardAnswer(true)" style="flex:1;padding:13px;border-radius:10px;background:#eaf6ed;border:1px solid #cfe9d4;color:#1f6b37;font-size:14px;font-weight:600;cursor:pointer;">Got it</button>' +
      '</div>'
      : '');
}

window.__flipCard = function() {
  flashState.flipped = !flashState.flipped;
  renderApp();
};

window.__cardAnswer = function(knewIt) {
  if (knewIt) { flashState.known++; } else { flashState.learning++; }
  flashState.idx++;
  flashState.flipped = false;
  renderApp();
};

const quizState = {
  size: 100,
  deck: [],
  idx: 0,
  score: 0,
  answered: null,
  sectionStats: {},
  finished: false
};

window.__startQuiz = function(size) {
  quizState.size = size;
  const pool = shuffleArr(QUESTIONS);
  quizState.deck = size >= pool.length ? pool : pool.slice(0, size);
  quizState.idx = 0;
  quizState.score = 0;
  quizState.answered = null;
  quizState.finished = false;
  quizState.sectionStats = {};
  quizState.deck.forEach(function(q) {
    if (!quizState.sectionStats[q.section]) {
      quizState.sectionStats[q.section] = { correct: 0, total: 0 };
    }
  });
  nav.mode = 'quiz';
  renderApp();
};

function renderQuiz(root) {
  if (quizState.finished) {
    renderQuizResults(root);
    return;
  }
  const q = quizState.deck[quizState.idx];
  const total = quizState.deck.length;
  const progress = Math.round((quizState.idx / total) * 100);

  let optionsHtml = q.options.map(function(opt, i) {
    let bg = '#fff';
    let border = '1px solid #ddd9d0';
    let textColor = '#1a1a1a';
    if (quizState.answered !== null) {
      if (i === q.answer) {
        border = '2px solid #2f8f4e';
        bg = '#eaf6ed';
        textColor = '#1f6b37';
      } else if (i === quizState.answered && i !== q.answer) {
        border = '2px solid #c94b4b';
        bg = '#fbecec';
        textColor = '#9c2f2f';
      }
    }
    return '<button onclick="window.__quizAnswer(' + i + ')" ' + (quizState.answered !== null ? 'disabled' : '') +
      ' style="display:block;width:100%;text-align:left;padding:13px 14px;margin-bottom:8px;border-radius:10px;background:' + bg + ';border:' + border + ';cursor:' + (quizState.answered !== null ? 'default' : 'pointer') + ';font-size:15px;color:' + textColor + ';-webkit-tap-highlight-color:transparent;">' +
      '<strong>' + String.fromCharCode(65 + i) + '.</strong> ' + opt + '</button>';
  }).join('');

  let feedbackHtml = '';
  if (quizState.answered !== null) {
    const isCorrect = quizState.answered === q.answer;
    feedbackHtml = '<div style="margin-top:14px;padding:14px 16px;border-radius:10px;background:' + (isCorrect ? '#eaf6ed' : '#fbecec') + ';">' +
      '<p style="margin:0 0 6px;font-weight:600;font-size:14px;color:' + (isCorrect ? '#1f6b37' : '#9c2f2f') + ';">' + (isCorrect ? 'Correct' : 'Not quite') + '</p>' +
      '<p style="margin:0;font-size:14px;color:#444;line-height:1.6;">' + q.explain + '</p>' +
      '</div>' +
      '<button onclick="window.__quizNext()" style="margin-top:14px;width:100%;padding:13px;border-radius:10px;background:#2f6fed;color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;">' +
      (quizState.idx === total - 1 ? 'See final results' : 'Next question') + '</button>';
  }

  root.innerHTML =
    '<button class="back-link" onclick="window.__goHome()">&larr; Back to study modes</button>' +
    '<div style="margin-bottom:16px;">' +
      '<div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:6px;">' +
        '<span>Question ' + (quizState.idx + 1) + ' of ' + total + '</span>' +
        '<span>' + q.section + '</span>' +
      '</div>' +
      '<div style="height:5px;background:#ece9e2;border-radius:4px;overflow:hidden;">' +
        '<div style="height:100%;width:' + progress + '%;background:#2f6fed;"></div>' +
      '</div>' +
    '</div>' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">' +
      '<span style="font-size:13px;color:#666;">Score: ' + quizState.score + '/' + (quizState.idx + (quizState.answered !== null ? 1 : 0)) + '</span>' +
    '</div>' +
    '<p style="font-size:17px;font-weight:600;margin:0 0 16px;line-height:1.5;">' + q.q + '</p>' +
    '<div>' + optionsHtml + '</div>' +
    feedbackHtml;
}

function renderQuizResults(root) {
  const total = quizState.deck.length;
  const pct = Math.round((quizState.score / total) * 100);
  const passed = pct >= 77;

  let sectionRows = Object.entries(quizState.sectionStats).map(function(entry) {
    const sec = entry[0];
    const stats = entry[1];
    if (stats.total === 0) return '';
    const secPct = Math.round((stats.correct / stats.total) * 100);
    const color = secPct >= 77 ? '#1f6b37' : (secPct >= 60 ? '#a0721f' : '#9c2f2f');
    return '<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #ece9e2;font-size:14px;">' +
      '<span style="color:#555;">' + sec + '</span>' +
      '<span style="font-weight:600;color:' + color + ';">' + stats.correct + '/' + stats.total + ' (' + secPct + '%)</span>' +
      '</div>';
  }).join('');

  root.innerHTML =
    '<button class="back-link" onclick="window.__goHome()">&larr; Back to study modes</button>' +
    '<div style="text-align:center;padding:0.5rem 0 1rem;">' +
      '<p style="font-size:13px;color:#888;margin:0 0 4px;">Final score</p>' +
      '<p style="font-size:44px;font-weight:700;margin:0;color:' + (passed ? '#1f6b37' : '#9c2f2f') + ';">' + pct + '%</p>' +
      '<p style="font-size:14px;color:#666;margin:8px 0 0;">' + quizState.score + ' of ' + total + ' correct' + (total >= 50 ? ' &middot; need 77% to pass' : '') + '</p>' +
      (total >= 50 ? '<p style="font-size:15px;font-weight:600;margin:10px 0 0;color:' + (passed ? '#1f6b37' : '#9c2f2f') + ';">' + (passed ? 'Passing score!' : 'Below passing threshold') + '</p>' : '') +
    '</div>' +
    '<div style="margin-top:1.5rem;">' +
      '<p style="font-size:13px;color:#888;margin:0 0 8px;">Breakdown by section</p>' +
      sectionRows +
    '</div>' +
    '<button onclick="window.__startQuiz(' + total + ')" style="margin-top:1.5rem;width:100%;padding:13px;border-radius:10px;background:#f0eee8;border:1px solid #ddd9d0;font-size:15px;font-weight:600;cursor:pointer;color:#1a1a1a;">Retake (' + total + ' new questions)</button>';
}

window.__quizAnswer = function(i) {
  if (quizState.answered !== null) return;
  quizState.answered = i;
  const q = quizState.deck[quizState.idx];
  quizState.sectionStats[q.section].total++;
  if (i === q.answer) {
    quizState.score++;
    quizState.sectionStats[q.section].correct++;
  }
  renderApp();
};

window.__quizNext = function() {
  if (quizState.idx === quizState.deck.length - 1) {
    quizState.finished = true;
    renderApp();
    return;
  }
  quizState.idx++;
  quizState.answered = null;
  renderApp();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.__goHome = function() {
  goHome();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

renderApp();
</script>
</body>
</html>
